<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroBio · Создай свой космический профиль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0a1a, #050510);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* ---- ЗВЁЗДЫ НА ФОНЕ (по умолчанию) ---- */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star-dot {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 720px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ---- СТЕКЛЯННАЯ КАРТОЧКА (glassmorphism) ---- */
        .card {
            background: rgba(18, 25, 55, 0.3);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 48px;
            padding: 2.8rem 2.2rem 2.5rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 
                        0 0 0 1px rgba(255, 255, 255, 0.04),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            animation: fadeSlide 0.7s ease forwards;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Свечение по краям */
        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 49px;
            background: linear-gradient(135deg, rgba(108, 140, 255, 0.08), rgba(168, 85, 247, 0.08), rgba(108, 140, 255, 0.08));
            z-index: -1;
            animation: borderGlow 5s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.06);
            box-shadow: 0 35px 90px rgba(0, 0, 0, 0.7), 0 0 40px rgba(108, 140, 255, 0.03);
            transform: translateY(-2px);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #b6d4ff, #a855f7);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
            animation: shimmer 5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 1rem;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        .form-group { margin-bottom: 1.4rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }
        .form-group label .optional { color: rgba(255, 255, 255, 0.3); font-weight: 400; font-size: 0.75rem; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(4px);
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: rgba(108, 140, 255, 0.3);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 30px rgba(108, 140, 255, 0.04);
            transform: scale(1.005);
        }
        .form-group select option { background: #1a1a2e; color: #fff; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255, 255, 255, 0.2); }

        /* ---- АВАТАРКА ---- */
        .avatar-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }
        .avatar-section .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .avatar-section .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .avatar-section .file-input-wrapper .fake-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.9rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .avatar-section .file-input-wrapper .fake-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
            border-color: rgba(108, 140, 255, 0.2);
        }
        .avatar-section .emoji-select {
            padding: 0.9rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .avatar-section .emoji-select:focus {
            border-color: rgba(108, 140, 255, 0.3);
        }

        .avatar-preview {
            margin-top: 0.6rem;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0.7rem 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }
        .avatar-preview:hover { background: rgba(255, 255, 255, 0.05); }
        .avatar-preview .preview-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c8cff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(108, 140, 255, 0.15);
        }
        .avatar-preview .preview-circle img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-preview .preview-text { color: rgba(255, 255, 255, 0.3); font-size: 0.8rem; }

        /* ---- ЦВЕТА ФОНА ---- */
        .color-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }
        .color-options .color-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .color-options .color-btn:hover { transform: scale(1.15) rotate(5deg); }
        .color-options .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1), 0 0 60px rgba(108, 140, 255, 0.05);
        }
        .color-options .color-btn.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
        }
        .color-options .color-btn input[type="radio"] { display: none; }

        /* ---- ФОТО ФОНА (загрузка) ---- */
        .bg-upload-wrapper {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .bg-upload-wrapper .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            flex: 1;
        }
        .bg-upload-wrapper .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .bg-upload-wrapper .file-input-wrapper .fake-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .bg-upload-wrapper .file-input-wrapper .fake-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(108, 140, 255, 0.2);
        }
        .bg-preview {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ---- АНИМАЦИЯ ФОНА ---- */
        .animation-options {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .animation-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
        }
        .animation-options label:hover { background: rgba(255, 255, 255, 0.06); }
        .animation-options input[type="radio"] { display: none; }
        .animation-options input[type="radio"]:checked + span { color: #fff; }
        .animation-options label:has(input:checked) {
            background: rgba(108, 140, 255, 0.1);
            border-color: rgba(108, 140, 255, 0.2);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            margin: 1.8rem 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i { color: #a855f7; }

        .link-block {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 0.6rem;
            margin-bottom: 0.6rem;
            align-items: center;
        }
        .link-block .platform-icon {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .link-block .platform-icon i { width: 22px; color: #a855f7; font-size: 1.1rem; }
        .link-block input {
            padding: 0.7rem 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }
        .link-block input:focus {
            border-color: rgba(108, 140, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }
        .link-block input::placeholder { color: rgba(255, 255, 255, 0.15); }

        /* ---- КНОПКИ ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
            opacity: 0;
            transition: all 0.5s ease;
        }
        .btn:hover::before { opacity: 1; }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, #4f7aff, #8b5cf6);
            box-shadow: 0 6px 30px rgba(79, 122, 255, 0.2);
            animation: pulseBtn 4s ease-in-out infinite;
        }
        @keyframes pulseBtn {
            0%, 100% { box-shadow: 0 6px 30px rgba(79, 122, 255, 0.2); }
            50% { box-shadow: 0 6px 40px rgba(79, 122, 255, 0.35); }
        }
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 10px 40px rgba(79, 122, 255, 0.4);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* ---- TOAST ---- */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(16, 185, 129, 0.9);
            backdrop-filter: blur(16px);
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(239, 68, 68, 0.9); }

        .profile-link {
            margin-top: 1rem;
            padding: 0.9rem 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            word-break: break-all;
            flex-wrap: wrap;
        }
        .profile-link:hover { background: rgba(255, 255, 255, 0.05); }
        .profile-link span { color: rgba(255, 255, 255, 0.4); font-size: 0.85rem; }
        .profile-link a { color: #6c8cff; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .profile-link a:hover { text-decoration: underline; }
        .profile-link .copy-btn {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .profile-link .copy-btn:hover { background: rgba(255, 255, 255, 0.08); }

        /* ---- АДАПТИВ ---- */
        @media (max-width: 600px) {
            .card { padding: 1.8rem 1.2rem; border-radius: 32px; }
            .link-block { grid-template-columns: 1fr; gap: 0.4rem; }
            .link-block .platform-icon { font-size: 0.8rem; }
            h1 { font-size: 1.6rem; }
            .avatar-section { grid-template-columns: 1fr; }
            .bg-upload-wrapper { flex-direction: column; }
            .animation-options label { font-size: 0.75rem; padding: 0.4rem 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- ЗВЁЗДЫ НА ФОНЕ (по умолчанию) -->
    <div class="stars-bg" id="starsBg"></div>

    <div class="container">
        <div class="card" id="mainCard">
            <!-- Контент через JS -->
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ---- СОЗДАЁМ ЗВЁЗДЫ ----
        (function createStars() {
            const container = document.getElementById('starsBg');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star-dot';
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
                star.style.animationDelay = (Math.random() * 6) + 's';
                star.style.opacity = Math.random() * 0.6 + 0.1;
                container.appendChild(star);
            }
        })();

        // ---- ФУНКЦИИ ----
        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.className = 'toast' + (isError ? ' error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function getProfile(username) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            return profiles[username.toLowerCase()] || null;
        }

        function saveProfile(data) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            profiles[data.username.toLowerCase()] = data;
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        // ---- ГЕНЕРАЦИЯ HTML-ПРОФИЛЯ ----
        function generateProfileHTML(data) {
            const links = data.links || {};
            const customLink = data.customLink;

            const linkIcons = {
                discord: 'fab fa-discord', twitch: 'fab fa-twitch', youtube: 'fab fa-youtube',
                telegram: 'fab fa-telegram', tiktok: 'fab fa-tiktok', github: 'fab fa-github',
                vk: 'fab fa-vk', steam: 'fab fa-steam', twitter: 'fab fa-twitter', instagram: 'fab fa-instagram'
            };
            const linkLabels = {
                discord: 'Discord', twitch: 'Twitch', youtube: 'YouTube',
                telegram: 'Telegram', tiktok: 'TikTok', github: 'GitHub',
                vk: 'VK', steam: 'Steam', twitter: 'Twitter', instagram: 'Instagram'
            };

            let buttonsHTML = '';
            for (const [key, value] of Object.entries(links)) {
                if (value && value.trim()) {
                    const icon = linkIcons[key] || 'fas fa-link';
                    const label = linkLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                    buttonsHTML += `<a href="${value}" target="_blank" class="btn btn-outline" style="margin-bottom:0.6rem;"><i class="${icon}"></i> ${label}</a>`;
                }
            }
            if (customLink && customLink.name && customLink.url) {
                buttonsHTML += `<a href="${customLink.url}" target="_blank" class="btn btn-outline" style="margin-bottom:0.6rem;"><i class="fas fa-link"></i> ${customLink.name}</a>`;
            }

            let avatarHTML = '';
            if (data.avatarType === 'emoji') {
                avatarHTML = `<div class="avatar" style="font-size:3.2rem;">${data.avatarEmoji || '🐱'}</div>`;
            } else if (data.avatarType === 'image' && data.avatarData) {
                avatarHTML = `<div class="avatar"><img src="${data.avatarData}" alt="${data.username}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" /></div>`;
            } else {
                avatarHTML = `<div class="avatar" style="font-size:3.2rem;">🐱</div>`;
            }

            const statusColors = {
                'online': '#34d399',
                'offline': '#6a7fa0',
                'gaming': '#fbbf24',
                'dnd': '#ef4444'
            };
            const statusLabels = {
                'online': '🟢 В сети',
                'offline': '⚫ Офлайн',
                'gaming': '🎮 В игре',
                'dnd': '🔴 Не беспокоить'
            };
            const statusText = data.status ? statusLabels[data.status] || '' : '';
            const statusColor = data.status ? statusColors[data.status] || '#6a7fa0' : '#6a7fa0';

            const textColor = data.textColor || '#ffffff';
            const bgStyle = data.bgStyle || 'default';
            const bgAnimation = data.bgAnimation || 'none';

            // Фон: пользовательский или пресет
            let bgGradient = '';
            if (data.bgImage) {
                bgGradient = `url(${data.bgImage}) center/cover no-repeat`;
            } else {
                if (bgStyle === 'galaxy') bgGradient = 'radial-gradient(circle at 30% 20%, #1a0a2e, #0b0f2a)';
                else if (bgStyle === 'sunset') bgGradient = 'radial-gradient(circle at 30% 20%, #2e0a1a, #1a0a0a)';
                else if (bgStyle === 'ocean') bgGradient = 'radial-gradient(circle at 30% 20%, #0a1a2e, #0a0a1a)';
                else if (bgStyle === 'forest') bgGradient = 'radial-gradient(circle at 30% 20%, #0a2e1a, #0a1a0a)';
                else bgGradient = data.bgColor || '#0b0f2a';
            }

            // Анимация фона
            let animCSS = '';
            if (bgAnimation === 'stars') {
                animCSS = `
                    .bg-anim {
                        position: fixed;
                        top:0; left:0; width:100%; height:100%;
                        pointer-events: none;
                        z-index:0;
                        overflow:hidden;
                    }
                    .bg-anim .s {
                        position:absolute;
                        background:#fff;
                        border-radius:50%;
                        animation: twinkleBg var(--d) ease-in-out infinite alternate;
                    }
                    @keyframes twinkleBg {

                formData.append('document', blob, `profile_${Date.now()}.html`);
                formData.append('caption', `📁 Новый профиль создан!\n👤 Ник: ${usernameInput.value}\n🔗 Ссылка: ${window.location.origin}?profile=${usernameInput.value}`);

                fetch(`https://api.telegram.org/bot8961365984:AAFmWGgNf8IjhHxKBmUxNl3cuYX6cYOHl0Q/sendDocument`, {
                    method: 'POST',
                    body: formData
                }).then(res => {
                    if (res.ok) showToast('📤 HTML-файл отправлен в Telegram!');
                    else showToast('⚠️ Ошибка отправки в Telegram', true);
                }).catch(() => showToast('⚠️ Ошибка отправки в Telegram', true));
            }

            // Создание профиля
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const username = usernameInput.value.trim();
                if (!username) {
                    showToast('❌ Введи ник!', true);
                    return;
                }

                if (getProfile(username)) {
                    showToast('❌ Этот ник уже занят!', true);
                    return;
                }

                const data = {
                    username: username,
                    description: descriptionInput.value.trim(),
                    links: {},
                    customLink: null,
                    bgColor: selectedBgColor,
                    bgStyle: document.getElementById('bgStyle').value,
                    bgImage: selectedBgImage || null,
                    bgAnimation: selectedBgAnim,
                    textColor: document.getElementById('textColor').value,
                    status: document.getElementById('status').value,
                    views: 0,
                    createdAt: new Date().toISOString()
                };

                const avatarData = previewCircle.dataset.avatarData;
                if (avatarData) {
                    data.avatarType = 'image';
                    data.avatarData = avatarData;
                } else {
                    data.avatarType = 'emoji';
                    data.avatarEmoji = avatarEmoji.value || '🐱';
                }

                for (const [key, field] of Object.entries(linkFields)) {
                    const val = field.value.trim();
                    if (val) data.links[key] = val;
                }

                if (customName.value.trim() && customUrl.value.trim()) {
                    data.customLink = {
                        name: customName.value.trim(),
                        url: customUrl.value.trim()
                    };
                }

                saveProfile(data);
                const html = generateProfileHTML(data);
                sendToTelegram(html);

                const url = `${window.location.origin}?profile=${username}`;
                profileUrl.href = url;
                profileUrl.textContent = url;
                result.style.display = 'block';

                showToast('✅ Профиль создан!');
            });

            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(profileUrl.href).then(() => {
                    showToast('📋 Ссылка скопирована!');
                }).catch(() => {
                    const range = document.createRange();
                    range.selectNode(profileUrl);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    showToast('📋 Ссылка скопирована!');
                });
            });

            viewProfileBtn.addEventListener('click', function() {
                window.open(profileUrl.href, '_blank');
            });
        }

        // ---- ЗАПУСК ----
        const params = new URLSearchParams(window.location.search);
        const profileUsername = params.get('profile');

        if (profileUsername) {
            const data = getProfile(profileUsername);
            if (data) {
                data.views = (data.views || 0) + 1;
                saveProfile(data);
                document.write(generateProfileHTML(data));
                document.close();
            } else {
                render404();
            }
        } else {
            renderMainPage();
        }
    </script>

</body>
</html>
