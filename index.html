<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroBio · Космический профиль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* ---- ЗВЁЗДЫ НА ФОНЕ ---- */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(18, 25, 55, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2.8rem 2.2rem 2.5rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 
                        0 0 0 1px rgba(120, 180, 255, 0.08),
                        inset 0 1px 0 rgba(255, 255, 255, 0.03);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            animation: fadeSlide 0.8s ease forwards;
        }

        /* Свечение по краям */
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(108, 140, 255, 0.15), rgba(168, 85, 247, 0.15), rgba(108, 140, 255, 0.15));
            z-index: -1;
            animation: borderGlow 4s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            border-color: rgba(120, 180, 255, 0.2);
            box-shadow: 0 35px 90px rgba(0, 0, 0, 0.9), 0 0 40px rgba(108, 140, 255, 0.05);
            transform: translateY(-2px);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #b6d4ff, #a855f7);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            text-align: center;
            color: #9ab3ff;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        .form-group { margin-bottom: 1.4rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #cdb4ff;
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }
        .form-group label .optional { color: #6a7fa0; font-weight: 400; font-size: 0.75rem; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: rgba(108, 140, 255, 0.4);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 30px rgba(108, 140, 255, 0.05);
            transform: scale(1.005);
        }
        .form-group select option { background: #1a1a2e; color: #fff; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group input::placeholder, .form-group textarea::placeholder { color: #4a5a7a; }

        /* Аватарка */
        .avatar-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }
        .avatar-section .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .avatar-section .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .avatar-section .file-input-wrapper .fake-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.9rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #9ab3ff;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .avatar-section .file-input-wrapper .fake-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
            border-color: rgba(108, 140, 255, 0.2);
        }
        .avatar-section .emoji-select {
            padding: 0.9rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .avatar-section .emoji-select:focus {
            border-color: rgba(108, 140, 255, 0.4);
            box-shadow: 0 0 30px rgba(108, 140, 255, 0.05);
        }

        .avatar-preview {
            margin-top: 0.6rem;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0.7rem 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }
        .avatar-preview:hover { background: rgba(255, 255, 255, 0.05); }
        .avatar-preview .preview-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c8cff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(108, 140, 255, 0.2);
        }
        .avatar-preview .preview-circle img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-preview .preview-text { color: #6a7fa0; font-size: 0.8rem; }

        /* Цвета фона */
        .color-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }
        .color-options .color-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .color-options .color-btn:hover { transform: scale(1.15) rotate(5deg); }
        .color-options .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15), 0 0 60px rgba(108, 140, 255, 0.1);
        }
        .color-options .color-btn.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
        }
        .color-options .color-btn input[type="radio"] { display: none; }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #cdb4ff;
            margin: 1.8rem 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i { color: #a855f7; }

        .link-block {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 0.6rem;
            margin-bottom: 0.6rem;
            align-items: center;
        }
        .link-block .platform-icon {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9ab3ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .link-block .platform-icon i { width: 22px; color: #a855f7; font-size: 1.1rem; }
        .link-block input {
            padding: 0.7rem 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }
        .link-block input:focus {
            border-color: rgba(108, 140, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(108, 140, 255, 0.03);
        }
        .link-block input::placeholder { color: #3a4a6a; }

        /* Кнопки */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0;
            transition: all 0.5s ease;
        }
        .btn:hover::before { opacity: 1; }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, #4f7aff, #8b5cf6);
            box-shadow: 0 6px 30px rgba(79, 122, 255, 0.25);
            animation: pulseButton 3s ease-in-out infinite;
        }
        @keyframes pulseButton {
            0%, 100% { box-shadow: 0 6px 30px rgba(79, 122, 255, 0.25); }
            50% { box-shadow: 0 6px 40px rgba(79, 122, 255, 0.4); }
        }
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 10px 40px rgba(79, 122, 255, 0.4);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(16px);
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(239, 68, 68, 0.95); }

        .profile-link {
            margin-top: 1rem;
            padding: 0.9rem 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            word-break: break-all;
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }
        .profile-link:hover { background: rgba(255, 255, 255, 0.06); }
        .profile-link span { color: #9ab3ff; font-size: 0.85rem; }
        .profile-link a { color: #6c8cff; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .profile-link a:hover { text-decoration: underline; }
        .profile-link .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #9ab3ff;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .profile-link .copy-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }

        @media (max-width: 600px) {
            .card { padding: 1.8rem 1.2rem; border-radius: 32px; }
            .link-block { grid-template-columns: 1fr; gap: 0.4rem; }
            .link-block .platform-icon { font-size: 0.8rem; }
            h1 { font-size: 1.6rem; }
            .avatar-section { grid-template-columns: 1fr; }
            .container { border-radius: 32px; }
        }

        /* ---- АНИМАЦИЯ ДЛЯ СТАТУСА ---- */
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
    </style>
</head>
<body>

    <!-- ЗВЁЗДЫ НА ФОНЕ (генерируются JS) -->

    <div class="container">

        </div>

    <div class="toast" id="toast"></div>

    <script>
        // ---- СОЗДАЁМ ЗВЁЗДЫ ----
        (function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = (Math.random() * 5) + 's';
                star.style.opacity = Math.random() * 0.8 + 0.2;
                container.appendChild(star);
            }
        })();

        // ============================================================
        //  ТВОИ ДАННЫЕ ДЛЯ TELEGRAM
        // ============================================================
        const BOT_TOKEN = '8961365984:AAFmWGgNf8IjhHxKBmUxNl3cuYX6cYOHl0Q';
        const CHAT_ID = '5577770421';
        // ============================================================

        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.className = 'toast' + (isError ? ' error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function getProfile(username) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            return profiles[username.toLowerCase()] || null;
        }

        function saveProfile(data) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            profiles[data.username.toLowerCase()] = data;
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        function deleteProfile(username) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            delete profiles[username.toLowerCase()];
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        // --- ГЕНЕРАЦИЯ HTML-ПРОФИЛЯ ---
        function generateProfileHTML(data) {
            const links = data.links || {};
            const customLink = data.customLink;

            const linkIcons = {
                discord: 'fab fa-discord', twitch: 'fab fa-twitch', youtube: 'fab fa-youtube',
                telegram: 'fab fa-telegram', tiktok: 'fab fa-tiktok', github: 'fab fa-github',
                vk: 'fab fa-vk', steam: 'fab fa-steam', twitter: 'fab fa-twitter', instagram: 'fab fa-instagram'
            };
            const linkLabels = {
                discord: 'Discord', twitch: 'Twitch', youtube: 'YouTube',
                telegram: 'Telegram', tiktok: 'TikTok', github: 'GitHub',
                vk: 'VK', steam: 'Steam', twitter: 'Twitter', instagram: 'Instagram'
            };

            let buttonsHTML = '';
            for (const [key, value] of Object.entries(links)) {
                if (value && value.trim()) {
                    const icon = linkIcons[key] || 'fas fa-link';
                    const label = linkLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                    buttonsHTML += `<a href="${value}" target="_blank" class="btn btn-outline" style="margin-bottom:0.6rem;"><i class="${icon}"></i> ${label}</a>`;
                }
            }
            if (customLink && customLink.name && customLink.url) {
                buttonsHTML += `<a href="${customLink.url}" target="_blank" class="btn btn-outline" style="margin-bottom:0.6rem;"><i class="fas fa-link"></i> ${customLink.name}</a>`;
            }

            let avatarHTML = '';
            if (data.avatarType === 'emoji') {
                avatarHTML = `<div class="avatar" style="font-size:3.2rem;">${data.avatarEmoji || '🐱'}</div>`;
            } else if (data.avatarType === 'image' && data.avatarData) {
                avatarHTML = `<div class="avatar"><img src="${data.avatarData}" alt="${data.username}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" /></div>`;
            } else {
                avatarHTML = `<div class="avatar" style="font-size:3.2rem;">🐱</div>`;
            }

            const statusColors = {
                'online': '#34d399',
                'offline': '#6a7fa0',
                'gaming': '#fbbf24',
                'dnd': '#ef4444'
            };
            const statusLabels = {
                'online': '🟢 В сети',
                'offline': '⚫ Офлайн',
                'gaming': '🎮 В игре',
                'dnd': '🔴 Не беспокоить'
            };
            const statusText = data.status ? statusLabels[data.status] || '' : '';
            const statusColor = data.status ? statusColors[data.status] || '#6a7fa0' : '#6a7fa0';

            const textColor = data.textColor || '#ffffff';
            const bgStyle = data.bgStyle || 'default';

            let bgGradient = '';
            if (bgStyle === 'galaxy') bgGradient = 'radial-gradient(circle at 30% 20%, #1a0a2e, #0b0f2a)';
            else if (bgStyle === 'sunset') bgGradient = 'radial-gradient(circle at 30% 20%, #2e0a1a, #1a0a0a)';
            else if (bgStyle === 'ocean') bgGradient = 'radial-gradient(circle at 30% 20%, #0a1a2e, #0a0a1a)';
            else if (bgStyle === 'forest') bgGradient = 'radial-gradient(circle at 30% 20%, #0a2e1a, #0a1a0a)';
            else bgGradient = data.bgColor || '#0b0f2a';

            return `<!DOCTYPE html>
        <html lang="ru">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>${data.username} · AstroBio</title>
            <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
            <style>
                * { margin:0; padding:0; box-sizing:border-box; }

                    background: ${bgGradient};
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-family: 'Inter', sans-serif;

                }

                    max-width: 480px;

                }
                .avatar {

                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: 800;
                    color: #fff;
                    box-shadow: 0 8px 40px rgba(108, 140, 255, 0.3);
                    border: 2px solid rgba(255, 255, 255, 0.15);

                }
                .name { font-size: 2rem; font-weight: 800; color: ${textColor}; }
                .status {
                    display: inline-block;
                    font-size: 0.75rem;
                    font-weight: 600;
                    padding: 0.3rem 1rem;
                    border-radius: 40px;
                    margin-top: 0.3rem;
                    background: rgba(255,255,255,0.05);
                    border: 1px solid rgba(255,255,255,0.05);
                    color: ${statusColor};
