<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroBio · Админка</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0a1a, #050510);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            color: #fff;
            position: relative;
        }

        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        .star-dot {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 680px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(18, 25, 55, 0.25);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #b6d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .sub {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: rgba(108,140,255,0.25);
            background: rgba(255,255,255,0.07);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            width: 100%;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #4f7aff, #8b5cf6);
            box-shadow: 0 4px 25px rgba(79,122,255,0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(79,122,255,0.35);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 25px rgba(239,68,68,0.2);
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(239,68,68,0.35);
        }
        .btn-outline {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5);
        }
        .btn-outline:hover { background: rgba(255,255,255,0.07); }

        .switch-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: 0.3s;
        }
        .switch-link span { color: #6c8cff; }
        .switch-link:hover { color: rgba(255,255,255,0.4); }

        /* ---- АДМИНКА ---- */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .admin-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
        }
        .admin-header .user-badge {
            font-size: 0.65rem;
            background: rgba(168,85,247,0.15);
            border: 1px solid rgba(168,85,247,0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #cdb4ff;
        }
        .admin-header .logout-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: rgba(255,255,255,0.3);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }
        .admin-header .logout-btn:hover {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
        }

        .bio-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 420px;
            overflow-y: auto;
        }
        .bio-list::-webkit-scrollbar { width: 4px; }
        .bio-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .bio-list::-webkit-scrollbar-thumb { background: rgba(108,140,255,0.15); border-radius: 10px; }

        .bio-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: 0.3s;
        }
        .bio-item:hover { background: rgba(255,255,255,0.05); }
        .bio-item .info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .bio-item .info .avatar-mini {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c8cff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        .bio-item .info .avatar-mini img { width: 100%; height: 100%; object-fit: cover; }
        .bio-item .info .name {
            font-weight: 600;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bio-item .info .meta {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            white-space: nowrap;
        }
        .bio-item .info .owner-badge {
            font-size: 0.5rem;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.1);
            padding: 0.1rem 0.5rem;
            border-radius: 30px;
            color: rgba(255,215,0,0.5);
            text-transform: uppercase;
        }
        .bio-item .actions {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
        }
        .bio-item .del-btn {
            background: rgba(239,68,68,0.1);
            border: none;
            color: #ef4444;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }
        .bio-item .del-btn:hover {
            background: rgba(239,68,68,0.2);
            transform: scale(1.05);
        }
        .bio-item .view-btn {
            background: rgba(108,140,255,0.1);
            border: none;
            color: #6c8cff;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
            text-decoration: none;
        }
        .bio-item .view-btn:hover {
            background: rgba(108,140,255,0.2);
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 2rem 0;
            color: rgba(255,255,255,0.2);
        }
        .empty-state i { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; opacity: 0.3; }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(16,185,129,0.9);
            backdrop-filter: blur(16px);
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
            font-size: 0.9rem;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(239,68,68,0.9); }

        /* ---- МОДАЛ ПОДТВЕРЖДЕНИЯ ---- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: rgba(18,25,55,0.9);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.04);
            text-align: center;
        }
        .modal-box .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .modal-box h3 { font-size: 1.2rem; color: #ff6b6b; margin-bottom: 0.3rem; }
        .modal-box p { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .modal-box .modal-actions {
            display: flex;
            gap: 0.8rem;
        }
        .modal-box .modal-actions .btn { width: 50%; padding: 0.6rem; font-size: 0.85rem; }

        @media (max-width: 480px) {
            .card { padding: 1.5rem 1.2rem; border-radius: 24px; }
            h1 { font-size: 1.4rem; }
            .bio-item { flex-wrap: wrap; gap: 0.5rem; }
            .bio-item .info { width: 100%; }
            .bio-item .actions { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <div class="stars-bg" id="starsBg"></div>

    <div class="container">
        <div class="card" id="mainCard">
            <!-- Контент через JS -->
        </div>
    </div>

    <!-- МОДАЛ ПОДТВЕРЖДЕНИЯ -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <div class="icon">⚠️</div>
            <h3>Точно удалить?</h3>
            <p id="confirmText">Био "username" будет удалено безвозвратно</p>
            <div class="modal-actions">
                <button class="btn btn-outline" id="modalCancel">Отмена</button>
                <button class="btn btn-danger" id="modalConfirm">🗑️ Удалить</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ---- ЗВЁЗДЫ ----
        (function() {
            const c = document.getElementById('starsBg');
            for (let i = 0; i < 100; i++) {
                const s = document.createElement('div');
                s.className = 'star-dot';
                const size = Math.random() * 2 + 0.5;
                s.style.cssText =
                    `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*4+2}s;animation-delay:${Math.random()*5}s;opacity:${Math.random()*0.5+0.1};`;
                c.appendChild(s);
            }
        })();

        // ---- TOAST ----
        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.className = 'toast' + (isError ? ' error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ---- АККАУНТЫ ----
        const USERS = {
            'AstroKot_Owner': {
                password: 'FlHwUoqp51k',
                role: 'owner'
            }
        };

        // Обычные пользователи: любой ник, пароль 123456 (или можно задать свой при регистрации)
        const SESSION_KEY = 'astroBioSession';

        function getSession() {
            try {
                return JSON.parse(localStorage.getItem(SESSION_KEY));
            } catch { return null; }
        }

        function setSession(username) {
            localStorage.setItem(SESSION_KEY, JSON.stringify({ username, loggedIn: true }));
        }

        function clearSession() {
            localStorage.removeItem(SESSION_KEY);
        }

        function isLoggedIn() {
            const session = getSession();
            return session && session.loggedIn;
        }

        function getCurrentUser() {
            const session = getSession();
            return session ? session.username : null;
        }

        function isOwner() {
            const user = getCurrentUser();
            return user === 'AstroKot_Owner';
        }

        function login(username, password) {
            // Владелец
            if (USERS[username] && USERS[username].password === password) {
                setSession(username);
                return true;
            }
            // Обычный пользователь (пароль 123456)
            if (password === '123456' && username && username.length > 0) {
                // Сохраняем обычного пользователя в USERS, если его нет
                if (!USERS[username]) {
                    USERS[username] = { password: '123456', role: 'user' };
                }
                setSession(username);
                return true;
            }
            return false;
        }

        function logout() {
            clearSession();
        }

        // ---- РАБОТА С БИО ----
        function getProfiles() {
            return JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
        }

        function saveProfiles(profiles) {
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        function deleteBio(username) {
            const profiles = getProfiles();
            delete profiles[username.toLowerCase()];
            saveProfiles(profiles);
        }

        function getBioOwner(username) {
            const profiles = getProfiles();
            return profiles[username.toLowerCase()] || null;
        }

        // ---- ОТПРАВКА В TELEGRAM ----
        function sendTelegram(text) {
            fetch(`https://api.telegram.org/bot8961365984:AAFmWGgNf8IjhHxKBmUxNl3cuYX6cYOHl0Q/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: '5577770421',
                    text: text,
                    parse_mode: 'HTML'
                })
            }).catch(() => {});
        }

        // ---- МОДАЛ ПОДТВЕРЖДЕНИЯ ----
        let pendingDelete = null;

        function showConfirmModal(username) {
            pendingDelete = username;
            document.getElementById('confirmText').textContent = `Био "${username}" будет удалено безвозвратно`;
            document.getElementById('confirmModal').classList.add('show');
        }

        function hideConfirmModal() {
            document.getElementById('confirmModal').classList.remove('show');
            pendingDelete = null;
        }

        document.getElementById('modalCancel').addEventListener('click', hideConfirmModal);
        document.getElementById('modalConfirm').addEventListener('click', function() {
            if (pendingDelete) {
                const username = pendingDelete;
                deleteBio(username);
                hideConfirmModal();
                showToast(`🗑️ Био "${username}" удалено!`);
                sendTelegram(`🗑️ Удалено био: ${username} (${getCurrentUser()})`);
                renderAdmin();
            }
        });
        document.getElementById('confirmModal').addEventListener('click', function(e) {
            if (e.target === this) hideConfirmModal();
        });

        // ---- РЕНДЕР СТРАНИЦ ----
        function renderLogin() {
            document.getElementById('mainCard').innerHTML = `
                <h1>🔐 Вход в аккаунт</h1>
                <div class="sub">Войди, чтобы управлять своими био</div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>👤 Логин</label>
                        <input type="text" id="loginUsername" placeholder="Твой ник" />
                    </div>
                    <div class="form-group">
                        <label>🔑 Пароль</label>
                        <input type="password" id="loginPassword" placeholder="Введи пароль" />
                        <div style="font-size:0.65rem;color:rgba(255,255,255,0.15);margin-top:0.3rem;">
                            Владелец: AstroKot_Owner | Пароль: FlHwUoqp51k<br />
                            Обычный: любой ник | Пароль: 123456
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>
            `;

            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                if (login(username, password)) {
                    showToast('✅ Вход выполнен!');
                    renderAdmin();
                } else {
                    showToast('❌ Неверный логин или пароль', true);
                }
            });
        }

        function renderAdmin() {
            const profiles = getProfiles();
            const keys = Object.keys(profiles);
            const currentUser = getCurrentUser();
            const isOwnerUser = isOwner();

            let listHTML = '';
            if (keys.length === 0) {
                listHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        Нет сохранённых био
                    </div>
                `;
            } else {
                // Фильтруем: владелец видит всё, обычный пользователь — только свои
                let filteredKeys = keys;
                if (!isOwnerUser) {
                    filteredKeys = keys.filter(key => {
                        const bio = profiles[key];
                        return bio.owner === currentUser;
                    });
                }

                if (filteredKeys.length === 0) {
                    listHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            У тебя нет сохранённых био
                        </div>
                    `;
                } else {
                    listHTML = filteredKeys.map(key => {
                        const bio = profiles[key];
                        const avatar = bio.avatarType === 'emoji' ?
                            bio.avatarEmoji || '🐱' :
                            (bio.avatarData ? `<img src="${bio.avatarData}" />` : '🐱');
                        const isOwnerBio = isOwnerUser;
                        const isOwnBio = bio.owner === currentUser;

                        return `
                            <div class="bio-item">
                                <div class="info">
                                    <div class="avatar-mini">${avatar}</div>
                                    <div>
                                        <div class="name">${bio.username}</div>
                                        <div class="meta">
                                            👁️ ${bio.views || 0} просмотров · ${new Date(bio.createdAt).toLocaleDateString()}
                                            ${isOwnerBio && bio.owner && bio.owner !== currentUser ? ` · <span class="owner-badge">👑 ${bio.owner}</span>` : ''}
                                            ${isOwnBio ? ' · <span style="color:rgba(255,255,255,0.15);">твоё</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                                <div class="actions">
                                    <a href="/?profile=${bio.username}" target="_blank" class="view-btn">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    ${(isOwnerUser || isOwnBio) ? `<button class="del-btn" data-username="${bio.username}">
                                        <i class="fas fa-trash"></i>
                                    </button>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            }

            document.getElementById('mainCard').innerHTML = `
                <div class="admin-header">
                    <div>
                        <h2>🚀 Управление био</h2>
                        <div class="user-badge">${isOwnerUser ? '👑 Владелец' : '👤 ' + currentUser}</div>
                    </div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                </div>
                <div class="bio-list">
                    ${listHTML}
                </div>
                <div style="margin-top:1.5rem; display:flex; gap:0.8rem; flex-wrap:wrap;">
                    <a href="/" class="btn btn-outline" style="flex:1; text-decoration:none;">
                        <i class="fas fa-plus"></i> Создать новое био
                    </a>
                    <button class="btn btn-outline" id="refreshBtn" style="flex:0 0 auto; width:auto; padding:0.8rem 1.2rem;">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
            `;

            // Удаление с подтверждением
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const username = this.dataset.username;
                    showConfirmModal(username);
                });
            });

            document.getElementById('logoutBtn').addEventListener('click', function() {
                logout();
                showToast('👋 Выход выполнен');
                renderLogin();
            });

            document.getElementById('refreshBtn').addEventListener('click', function() {
                renderAdmin();
                showToast('🔄 Обновлено');
            });
        }

        // ---- ЗАПУСК ----
        if (isLoggedIn()) {
            renderAdmin();
        } else {
            renderLogin();
        }
    </script>
</body>
</html>
