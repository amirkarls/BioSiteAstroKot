<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroBio · Создай профиль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 30% 20%, #0b0f2a, #030514);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            color: #fff;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.97); }
            100% { opacity: 1; transform: scale(1); }
        }
        .container { max-width: 700px; width: 100%; }
        .card {
            background: rgba(18, 25, 55, 0.6);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(120, 180, 255, 0.1);
            border-radius: 48px;
            padding: 2.5rem 2rem 2.2rem;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8);
            transition: 0.4s;
        }
        .card:hover { border-color: rgba(120, 180, 255, 0.2); }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #b6d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .subtitle {
            text-align: center;
            color: #9ab3ff;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
            padding-bottom: 1rem;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #d3e2ff;
            margin-bottom: 0.3rem;
        }
        .form-group label .optional { color: #6a7fa0; font-weight: 400; font-size: 0.8rem; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: rgba(108, 140, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 25px rgba(108, 140, 255, 0.05);
        }
        .form-group select option { background: #1a1a2e; color: #fff; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group input::placeholder, .form-group textarea::placeholder { color: #4a5a7a; }

        .avatar-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }
        .avatar-section .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .avatar-section .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .avatar-section .file-input-wrapper .fake-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.8rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #9ab3ff;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.3s;
            cursor: pointer;
        }
        .avatar-section .file-input-wrapper .fake-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }
        .avatar-section .emoji-select {
            padding: 0.8rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .avatar-section .emoji-select:focus { border-color: rgba(108, 140, 255, 0.5); }

        .avatar-preview {
            margin-top: 0.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.6rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .avatar-preview:hover { background: rgba(255, 255, 255, 0.06); }
        .avatar-preview .preview-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c8cff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        .avatar-preview .preview-circle img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-preview .preview-text { color: #6a7fa0; font-size: 0.8rem; }

        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }
        .color-options .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .color-options .color-btn:hover { transform: scale(1.15); box-shadow: 0 0 25px rgba(255,255,255,0.1); }
        .color-options .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        .color-options .color-btn.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .color-options .color-btn input[type="radio"] { display: none; }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #cdb4ff;
            margin: 1.5rem 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i { color: #a855f7; }

        .link-block {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 0.6rem;
            margin-bottom: 0.6rem;
            align-items: center;
        }
        .link-block .platform-icon {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9ab3ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .link-block .platform-icon i { width: 20px; color: #a855f7; }
        .link-block input {
            padding: 0.6rem 0.9rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
            width: 100%;
        }
        .link-block input:focus {
            border-color: rgba(108, 140, 255, 0.4);
            background: rgba(255, 255, 255, 0.07);
        }
        .link-block input::placeholder { color: #3a4a6a; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: 0.3s ease;
            text-decoration: none;
            color: #fff;
            width: 100%;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #4f7aff, #8b5cf6);
            box-shadow: 0 6px 25px rgba(79, 122, 255, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(79, 122, 255, 0.4);
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: rgba(239, 68, 68, 0.9); }

        .profile-link {
            margin-top: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            word-break: break-all;
            flex-wrap: wrap;
        }
        .profile-link:hover { background: rgba(255, 255, 255, 0.06); }
        .profile-link span { color: #9ab3ff; font-size: 0.85rem; }
        .profile-link a { color: #6c8cff; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .profile-link a:hover { text-decoration: underline; }
        .profile-link .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #9ab3ff;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .profile-link .copy-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .card { padding: 1.8rem 1.2rem; }
            .link-block { grid-template-columns: 1fr; gap: 0.3rem; }
            .link-block .platform-icon { font-size: 0.8rem; }
            h1 { font-size: 1.5rem; }
            .avatar-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="mainCard"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  ТВОИ ДАННЫЕ ДЛЯ TELEGRAM
        // ============================================================
        const BOT_TOKEN = '8961365984:AAFmWGgNf8IjhHxKBmUxNl3cuYX6cYOHl0Q';
        const CHAT_ID = '5577770421';
        // ============================================================

        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.className = 'toast' + (isError ? ' error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function getProfile(username) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            return profiles[username.toLowerCase()] || null;
        }

        function saveProfile(data) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            profiles[data.username.toLowerCase()] = data;
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        function deleteProfile(username) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            delete profiles[username.toLowerCase()];
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        // --- ГЕНЕРАЦИЯ ПРОФИЛЯ (ОТДЕЛЬНАЯ СТРАНИЦА) ---
        function generateProfileHTML(data) {
            const links = data.links || {};
            const customLink = data.customLink;

            const linkIcons = {
                discord: 'fab fa-discord', twitch: 'fab fa-twitch', youtube: 'fab fa-youtube',
                telegram: 'fab fa-telegram', tiktok: 'fab fa-tiktok', github: 'fab fa-github',
                vk: 'fab fa-vk', steam: 'fab fa-steam', twitter: 'fab fa-twitter', instagram: 'fab fa-instagram'
            };
            const linkLabels = {
                discord: 'Discord', twitch: 'Twitch', youtube: 'YouTube',
                telegram: 'Telegram', tiktok: 'TikTok', github: 'GitHub',
                vk: 'VK', steam: 'Steam', twitter: 'Twitter', instagram: 'Instagram'
            };

            let buttonsHTML = '';
            for (const [key, value] of Object.entries(links)) {
                if (value && value.trim()) {
                    const icon = linkIcons[key] || 'fas fa-link';
                    const label = linkLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                    buttonsHTML += `<a href="${value}" target="_blank" class="btn" style="margin-bottom:0.6rem;"><i class="${icon}"></i> ${label}</a>`;
                }
            }
            if (customLink && customLink.name && customLink.url) {
                buttonsHTML += `<a href="${customLink.url}" target="_blank" class="btn" style="margin-bottom:0.6rem;"><i class="fas fa-link"></i> ${customLink.name}</a>`;
            }

            let avatarHTML = '';
            if (data.avatarType === 'emoji') {
                avatarHTML = `<div class="avatar" style="font-size:3.2rem;">${data.avatarEmoji || '🐱'}</div>`;
            } else if (data.avatarType === 'image' && data.avatarData) {
                avatarHTML = `<div class="avatar"><img src="${data.avatarData}" alt="${data.username}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" /></div>`;
            } else {
                avatarHTML = `<div class="avatar" style="font-size:3.2rem;">🐱</div>`;
            }

            const statusColors = {
                'online': '#34d399',
                'offline': '#6a7fa0',
                'gaming': '#fbbf24',
                'dnd': '#ef4444'
            };
            const statusLabels = {
                'online': '🟢 В сети',
                'offline': '⚫ Офлайн',
                'gaming': '🎮 В игре',
                'dnd': '🔴 Не беспокоить'
            };
            const statusText = data.status ? statusLabels[data.status] || '' : '';
            const statusColor = data.status ? statusColors[data.status] || '#6a7fa0' : '#6a7fa0';

            const textColor = data.textColor || '#ffffff';
            const bgStyle = data.bgStyle || 'default';

            let bgGradient = '';
            if (bgStyle === 'galaxy') bgGradient = 'radial-gradient(circle at 30% 20%, #1a0a2e, #0b0f2a)';
            else if (bgStyle === 'sunset') bgGradient = 'radial-gradient(circle at 30% 20%, #2e0a1a, #1a0a0a)';
            else if (bgStyle === 'ocean') bgGradient = 'radial-gradient(circle at 30% 20%, #0a1a2e, #0a0a1a)';
            else if (bgStyle === 'forest') bgGradient = 'radial-gradient(circle at 30% 20%, #0a2e1a, #0a1a0a)';
            else bgGradient = data.bgColor || '#0b0f2a';

            return `<!DOCTYPE html>
        <html lang="ru">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>${data.username} · AstroBio</title>
            <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
            <style>
                * { margin:0; padding:0; box-sizing:border-box; }
                body {
                    background: ${bgGradient};
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-family: 'Inter', sans-serif;
                    padding: 1.5rem;
                    color: #fff;
                    animation: fadeIn 0.8s ease;
                }
                @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.97); } 100% { opacity: 1; transform: scale(1); } }
                .card {
                    max-width: 480px;
                    width: 100%;
                    background: rgba(18, 25, 55, 0.55);
                    backdrop-filter: blur(12px);
                    border: 1px solid rgba(120, 180, 255, 0.12);
                    border-radius: 48px;
                    padding: 2.5rem 2rem 2.2rem;
                    box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8);
                    text-align: center;
                    animation: slideUp 0.6s ease;
                }
                @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
                .avatar {
                    width: 110px;
                    height: 110px;
                    margin: 0 auto 1.2rem;
                    background: linear-gradient(135deg, #6c8cff, #a855f7);
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: 800;
                    color: #fff;
                    box-shadow: 0 8px 30px rgba(108, 140, 255, 0.35);
                    border: 2px solid rgba(255, 255, 255, 0.2);
                    overflow: hidden;
                }
                .name { font-size: 2rem; font-weight: 800; color: ${textColor}; }
                .status {
                    display: inline-block;
                    font-size: 0.75rem;
                    font-weight: 600;
                    padding: 0.2rem 0.9rem;
                    border-radius: 40px;
                    margin-top: 0.3rem;
                    background: rgba(255,255,255,0.05);
                    border: 1px solid rgba(255,255,255,0.05);
                    color: ${statusColor};
                }
                .badge {
                    display: inline-block;
                    font-size: 0.65rem;
                    font-weight: 700;
                    background: rgba(168, 85, 247, 0.2);
                    border: 1px solid rgba(168, 85, 247, 0.4);
                    padding: 0.25rem 1rem;
                    border-radius: 40px;
                    color: #cdb4ff;
                    letter-spacing: 0.5px;
                    text-transform: uppercase;
                    margin-top: 0.3rem;
                }
                .desc {
                    color: ${textColor};
                    font-size: 0.95rem;
                    line-height: 1.6;
                    margin: 1rem 0 1.5rem 0;
                    padding: 1rem;
                    background: rgba(0, 10, 30, 0.3);
                    border-radius: 16px;
                    border-left: 3px solid #6c8cff;
                }
                .links { display: flex; flex-direction: column; gap: 0.6rem; }
                .btn {
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 10px;
                    padding: 0.8rem;
                    border-radius: 60px;
                    background: rgba(255, 255, 255, 0.04);
                    border: 1px solid rgba(255, 255, 255, 0.07);
                    color: #d3e2ff;
                    text-decoration: none;
                    font-weight: 600;
                    font-size: 0.95rem;
                    transition: 0.3s ease;
                }
                .btn:hover { background: rgba(108, 140, 255, 0.13); border-color: rgba(108, 140, 255, 0.25); transform: scale(1.02); }
                .btn i { width: 24px; color: #8ab4ff; }
                .footer {
                    margin-top: 1.5rem;
                    font-size: 0.7rem;
                    color: rgba(255, 255, 255, 0.15);
                    display: flex;
                    justify-content: center;
                    gap: 1rem;
                }
                .footer span { color: rgba(255, 255, 255, 0.1); }
                .share-btn {
                    background: rgba(255,255,255,0.03);
                    border: none;
                    color: rgba(255,255,255,0.2);
                    cursor: pointer;
                    font-size: 0.7rem;
                    transition: 0.3s;
                    padding: 0.2rem 0.6rem;
                    border-radius: 30px;
                }
                .share-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); }
                @media (max-width: 480px) {
                    .card { padding: 1.8rem 1.2rem; }
                    .name { font-size: 1.5rem; }
                    .avatar { width: 85px; height: 85px; font-size: 2.5rem; }
                }
            </style>
        </head>
        <body>
            <div class="card">
                ${avatarHTML}
                <div class="name">${data.username}</div>
                ${statusText ? `<div class="status">${statusText}</div>` : ''}
                <div class="badge"><i class="fas fa-rocket" style="margin-right:5px;"></i> Flipple Arcade</div>
                ${data.description ? `<div class="desc">${data.description}</div>` : ''}
                ${buttonsHTML ? `<div class="links">${buttonsHTML}</div>` : ''}
                <div class="footer">
                    <span>👁️ ${data.views || 0} просмотров</span>
                    <span>·</span>
                    <span>📅 ${new Date(data.createdAt).toLocaleDateString()}</span>
                    <button class="share-btn" onclick="navigator.share ? navigator.share({title:'${data.username}', url:window.location.href}) : navigator.clipboard.writeText(window.location.href).then(()=>alert('Ссылка скопирована!'))">
                        <i class="fas fa-share-alt"></i> Поделиться
                    </button>
                </div>
            </div>
        </body>
        </html>`;
        }

        // --- 404 СТРАНИЦА ---
        function render404() {
            document.getElementById('mainCard').innerHTML = `
                <div style="text-align:center; padding:2rem 0;">
                    <div style="font-size:6rem; margin-bottom:1rem; animation: float 3s ease-in-out infinite;">🚀</div>
                    <h1 style="font-size:2.5rem; font-weight:800; color:#ff6b6b; margin-bottom:0.5rem;">404</h1>
                    <p style="color:#9ab3ff; font-size:1.1rem; margin-bottom:0.5rem;">Космический профиль не найден</p>
                    <p style="color:#6a7fa0; font-size:0.9rem; margin-bottom:2rem;">Возможно, он ещё не создан или был удалён</p>
                    <a href="/" class="btn btn-primary" style="max-width:280px; margin:0 auto;">
                        <i class="fas fa-home"></i> Вернуться на главную
                    </a>
                </div>
                <style>
                    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
                </style>
            `;
        }

        // --- ОСНОВНАЯ СТРАНИЦА (форма создания) ---
        function renderMainPage() {
            document.getElementById('mainCard').innerHTML = `
                <h1>✨ AstroBio</h1>
                <div class="subtitle">Создай свой космический профиль для Flipple Arcade</div>
                <form id="bioForm">
                    <div class="form-group">
                        <label>📛 Ник <span style="color:#ff6b6b;">*</span></label>
                        <input type="text" id="username" placeholder="Введи свой ник" required />
                    </div>
                    <div class="form-group">
                        <label>🖼️ Аватарка</label>
                        <div class="avatar-section">
                            <div class="file-input-wrapper">
                                <div class="fake-btn"><i class="fas fa-upload"></i> Загрузить фото</div>
                                <input type="file" id="avatarFile" accept="image/*" />
                            </div>
                            <select class="emoji-select" id="avatarEmoji">
                                <option value="🐱">🐱 Кот</option>
                                <option value="🚀">🚀 Ракета</option>
                                <option value="⭐">⭐ Звезда</option>
                                <option value="🌙">🌙 Луна</option>
                                <option value="🪐">🪐 Сатурн</option>
                                <option value="👾">👾 Инопланетянин</option>
                                <option value="🤖">🤖 Робот</option>
                                <option value="🎮">🎮 Геймер</option>
                                <option value="🔥">🔥 Огонь</option>
                                <option value="💎">💎 Алмаз</option>
                                <option value="🌈">🌈 Радуга</option>
                                <option value="🌌">🌌 Галактика</option>
                                <option value="🐉">🐉 Дракон</option>
                                <option value="🦊">🦊 Лиса</option>
                                <option value="🐺">🐺 Волк</option>
                                <option value="😺">😺 Улыбка</option>
                            </select>
                        </div>
                        <div class="avatar-preview" id="avatarPreview">
                            <div class="preview-circle" id="previewCircle">🐱</div>
                            <span class="preview-text" id="previewText">Выбери эмодзи или загрузи фото</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>📝 Описание</label>
                        <textarea id="description" placeholder="Расскажи о себе..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>🎨 Цвет фона</label>
                        <div class="color-options" id="colorOptions">
                            <label class="color-btn active" style="background:#0b0f2a;"><input type="radio" name="bgColor" value="#0b0f2a" checked /></label>
                            <label class="color-btn" style="background:#1a0a2e;"><input type="radio" name="bgColor" value="#1a0a2e" /></label>
                            <label class="color-btn" style="background:#0a1a2e;"><input type="radio" name="bgColor" value="#0a1a2e" /></label>
                            <label class="color-btn" style="background:#2e0a1a;"><input type="radio" name="bgColor" value="#2e0a1a" /></label>
                            <label class="color-btn" style="background:#1a2e0a;"><input type="radio" name="bgColor" value="#1a2e0a" /></label>
                            <label class="color-btn" style="background:#2e1a0a;"><input type="radio" name="bgColor" value="#2e1a0a" /></label>
                            <label class="color-btn" style="background:#0a0a2e;"><input type="radio" name="bgColor" value="#0a0a2e" /></label>
                            <label class="color-btn" style="background:#1a0a0a;"><input type="radio" name="bgColor" value="#1a0a0a" /></label>
                            <label class="color-btn" style="background:#0a1a1a;"><input type="radio" name="bgColor" value="#0a1a1a" /></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>🌈 Стиль фона</label>
                        <select id="bgStyle">
                            <option value="default">🌌 Классический</option>
                            <option value="galaxy">🌠 Галактика</option>
                            <option value="sunset">🌅 Закат</option>
                            <option value="ocean">🌊 Океан</option>
                            <option value="forest">🌿 Лес</option>
                        </select>
    </div>
