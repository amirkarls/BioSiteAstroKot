<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroBio · Мои био</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0a1a, #050510);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            color: #fff;
            position: relative;
        }

        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        .star-dot {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 680px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(18, 25, 55, 0.25);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #b6d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .sub {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: rgba(108,140,255,0.25);
            background: rgba(255,255,255,0.07);
        }
        .form-group textarea { resize: vertical; min-height: 60px; }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-input-wrapper .fake-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.7rem 1rem;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .file-input-wrapper .fake-btn:hover {
            background: rgba(255,255,255,0.08);
        }
        .file-preview {
            margin-top: 0.3rem;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .file-preview .preview-thumb {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .file-preview .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .file-preview .preview-thumb .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.1);
            font-size: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            width: 100%;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #4f7aff, #8b5cf6);
            box-shadow: 0 4px 25px rgba(79,122,255,0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(79,122,255,0.35);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 25px rgba(239,68,68,0.2);
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(239,68,68,0.35);
        }
        .btn-outline {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5);
        }
        .btn-outline:hover { background: rgba(255,255,255,0.07); }
        .btn-success {
            background: linear-gradient(135deg, #10b981, #34d399);
            box-shadow: 0 4px 25px rgba(16,185,129,0.2);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(16,185,129,0.35);
        }

        .switch-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: 0.3s;
        }
        .switch-link span { color: #6c8cff; }
        .switch-link:hover { color: rgba(255,255,255,0.4); }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding-bottom: 0.5rem;
        }
        .tabs .tab {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }
        .tabs .tab.active {
            color: #fff;
            background: rgba(108,140,255,0.08);
            border-color: rgba(108,140,255,0.1);
        }
        .tabs .tab:hover { color: rgba(255,255,255,0.6); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .profile-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
        }
        .profile-header .user-badge {
            font-size: 0.65rem;
            background: rgba(168,85,247,0.15);
            border: 1px solid rgba(168,85,247,0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #cdb4ff;
        }
        .profile-header .logout-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: rgba(255,255,255,0.3);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }
        .profile-header .logout-btn:hover {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
        }

        .bio-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 420px;
            overflow-y: auto;
        }
        .bio-list::-webkit-scrollbar { width: 4px; }
        .bio-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .bio-list::-webkit-scrollbar-thumb { background: rgba(108,140,255,0.15); border-radius: 10px; }

        .bio-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: 0.3s;
        }
        .bio-item:hover { background: rgba(255,255,255,0.05); }
        .bio-item .info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .bio-item .info .avatar-mini {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c8cff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        .bio-item .info .avatar-mini img { width: 100%; height: 100%; object-fit: cover; }
        .bio-item .info .name {
            font-weight: 600;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bio-item .info .meta {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            white-space: nowrap;
        }
        .bio-item .info .owner-badge {
            font-size: 0.5rem;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.1);
            padding: 0.1rem 0.5rem;
            border-radius: 30px;
            color: rgba(255,215,0,0.5);
            text-transform: uppercase;
        }
        .bio-item .actions {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
        }
        .bio-item .del-btn {
            background: rgba(239,68,68,0.1);
            border: none;
            color: #ef4444;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }
        .bio-item .del-btn:hover {
            background: rgba(239,68,68,0.2);
            transform: scale(1.05);
        }
        .bio-item .view-btn {
            background: rgba(108,140,255,0.1);
            border: none;
            color: #6c8cff;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
            text-decoration: none;
        }
        .bio-item .view-btn:hover {
            background: rgba(108,140,255,0.2);
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 2rem 0;
            color: rgba(255,255,255,0.2);
        }
        .empty-state i { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; opacity: 0.3; }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(16,185,129,0.9);
            backdrop-filter: blur(16px);
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
            font-size: 0.9rem;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(239,68,68,0.9); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: rgba(18,25,55,0.9);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.04);
            text-align: center;
        }
        .modal-box .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .modal-box h3 { font-size: 1.2rem; color: #ff6b6b; margin-bottom: 0.3rem; }
        .modal-box p { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .modal-box .modal-actions {
            display: flex;
            gap: 0.8rem;
        }
        .modal-box .modal-actions .btn { width: 50%; padding: 0.6rem; font-size: 0.85rem; }

        .share-link-box {
            margin-top: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }
        .share-link-box .link {
            color: #6c8cff;
            font-size: 0.8rem;
            word-break: break-all;
            flex: 1;
        }
        .share-link-box .copy-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: rgba(255,255,255,0.4);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }
        .share-link-box .copy-btn:hover { background: rgba(255,255,255,0.08); }

        @media (max-width: 480px) {
            .card { padding: 1.5rem 1.2rem; border-radius: 24px; }
            h1 { font-size: 1.4rem; }
            .bio-item { flex-wrap: wrap; gap: 0.5rem; }
            .bio-item .info { width: 100%; }
            .bio-item .actions { width: 100%; justify-content: flex-end; }
            .tabs .tab { font-size: 0.7rem; padding: 0.3rem 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="stars-bg" id="starsBg"></div>

    <div class="container">
        <div class="card" id="mainCard">
            <!-- Контент через JS -->
        </div>
    </div>

    <!-- МОДАЛ ПОДТВЕРЖДЕНИЯ -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <div class="icon">⚠️</div>
            <h3>Точно удалить?</h3>
            <p id="confirmText">Био "username" будет удалено безвозвратно</p>
            <div class="modal-actions">
                <button class="btn btn-outline" id="modalCancel">Отмена</button>
                <button class="btn btn-danger" id="modalConfirm">🗑️ Удалить</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ---- ЗВЁЗДЫ ----
        (function() {
            const c = document.getElementById('starsBg');
            for (let i = 0; i < 100; i++) {
                const s = document.createElement('div');
                s.className = 'star-dot';
                const size = Math.random() * 2 + 0.5;
                s.style.cssText =
                    `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*4+2}s;animation-delay:${Math.random()*5}s;opacity:${Math.random()*0.5+0.1};`;
                c.appendChild(s);
            }
        })();

        // ---- TOAST ----
        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.className = 'toast' + (isError ? ' error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ---- АККАУНТЫ ----
        const USERS = {
            'AstroKot_Owner': {
                password: 'FlHwUoqp51k',
                role: 'owner'
            }
        };

        const SESSION_KEY = 'astroBioSession';

        function getSession() {
            try {
                return JSON.parse(localStorage.getItem(SESSION_KEY));
            } catch { return null; }
        }

        function setSession(username) {
            localStorage.setItem(SESSION_KEY, JSON.stringify({ username, loggedIn: true }));
        }

        function clearSession() {
            localStorage.removeItem(SESSION_KEY);
        }

        function isLoggedIn() {
            const session = getSession();
            return session && session.loggedIn;
        }

        function getCurrentUser() {
            const session = getSession();
            return session ? session.username : null;
        }

        function isOwner() {
            const user = getCurrentUser();
            return user === 'AstroKot_Owner';
        }

        function login(username, password) {
            if (USERS[username] && USERS[username].password === password) {
                setSession(username);
                return true;
            }
            if (password === '123456' && username && username.length > 0) {
                if (!USERS[username]) {
                    USERS[username] = { password: '123456', role: 'user' };
                }
                setSession(username);
                return true;
            }
            return false;
        }

        function register(username, password) {
            if (USERS[username]) return false;
            USERS[username] = { password: password, role: 'user' };
            setSession(username);
            return true;
        }

        function logout() {
            clearSession();
        }

        // ---- РАБОТА С БИО ----
        function getProfiles() {
            return JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
        }

        function saveProfiles(profiles) {
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        function getUserBio(username) {
            const profiles = getProfiles();
            for (const key in profiles) {
                if (profiles[key].owner === username) {
                    return profiles[key];
                }
            }
            return null;
        }

        function deleteBio(username) {
            const profiles = getProfiles();
            delete profiles[username.toLowerCase()];
            saveProfiles(profiles);
        }

        // ---- ОТПРАВКА В TELEGRAM ----
        function sendTelegram(text) {
            fetch(`https://api.telegram.org/bot8961365984:AAFmWGgNf8IjhHxKBmUxNl3cuYX6cYOHl0Q/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: '5577770421',
                    text: text,
                    parse_mode: 'HTML'
                })
            }).catch(() => {});
        }

        // ---- МОДАЛ ПОДТВЕРЖДЕНИЯ ----
        let pendingDelete = null;

        function showConfirmModal(username) {
            pendingDelete = username;
            document.getElementById('confirmText').textContent = `Био "${username}" будет удалено безвозвратно`;
            document.getElementById('confirmModal').classList.add('show');
        }

        function hideConfirmModal() {
            document.getElementById('confirmModal').classList.remove('show');
            pendingDelete = null;
        }

        document.getElementById('modalCancel').addEventListener('click', hideConfirmModal);
        document.getElementById('modalConfirm').addEventListener('click', function() {
            if (pendingDelete) {
                const username = pendingDelete;
                deleteBio(username);
                hideConfirmModal();
                showToast(`🗑️ Био "${username}" удалено!`);
                sendTelegram(`🗑️ Удалено био: ${username} (${getCurrentUser()})`);
                renderDashboard();
            }
        });
        document.getElementById('confirmModal').addEventListener('click', function(e) {
            if (e.target === this) hideConfirmModal();
        });

        // ---- ФОРМА СОЗДАНИЯ БИО ----
        function renderCreateBioForm() {
            const currentUser = getCurrentUser();
            const existingBio = getUserBio(currentUser);

            // Проверяем лимит — 1 био на аккаунт
            if (existingBio) {
                showToast('❌ У тебя уже есть био! Можно создать только одно.', true);
                renderDashboard();
                return;
            }

            document.getElementById('mainCard').innerHTML = `
                <div class="profile-header">
                    <div>
                        <h2>✨ Создать новое био</h2>
                        <div class="user-badge">${isOwner() ? '👑 Владелец' : '👤 ' + currentUser}</div>
                    </div>
                    <button class="logout-btn" id="backToDashboard"><i class="fas fa-arrow-left"></i> Назад</button>
                </div>

                <form id="createBioForm">
                    <div class="form-group">
                        <label>📛 Ник *</label>
                        <input type="text" id="newUsername" placeholder="Введи ник" required />
                    </div>
                    <div class="form-group">
                        <label>📝 Описание</label>
                        <textarea id="newDescription" placeholder="Расскажи о себе..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>🏷️ Роль / статус</label>
                        <input type="text" id="newRole" placeholder="Например: Стример, Кодер..." value="Flipple Arcade" />
                    </div>
                    <div class="form-group">
                        <label>🎨 Цвет текста</label>
                        <select id="newTextColor">
                            <option value="#ffffff">⬜ Белый</option>
                            <option value="#f0f9ff">💠 Голубой</option>
                            <option value="#fbbf24">⭐ Золотой</option>
                            <option value="#34d399">🌿 Изумрудный</option>
                            <option value="#f472b6">🌸 Розовый</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🖼️ Картинка 1 (превью)</label>
                        <div class="file-input-wrapper">
                            <div class="fake-btn"><i class="fas fa-image"></i> Загрузить картинку 1</div>
                            <input type="file" id="newImage1" accept="image/*" />
                        </div>
                        <div class="file-preview" id="preview1"></div>
                    </div>
                    <div class="form-group">
                        <label>🖼️ Картинка 2 (дополнительная)</label>
                        <div class="file-input-wrapper">
                            <div class="fake-btn"><i class="fas fa-image"></i> Загрузить картинку 2</div>
                            <input type="file" id="newImage2" accept="image/*" />
                        </div>
                        <div class="file-preview" id="preview2"></div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-rocket"></i> Создать био
                    </button>
                </form>
            `;

            // Предпросмотр картинок
            document.getElementById('newImage1').addEventListener('change', function(e) {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById('preview1').innerHTML =
                            `<div class="preview-thumb"><img src="${ev.target.result}" /></div>`;
                    };
                    reader.readAsDataURL(file);
                }
            });
            document.getElementById('newImage2').addEventListener('change', function(e) {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById('preview2').innerHTML =
                            `<div class="preview-thumb"><img src="${ev.target.result}" /></div>`;
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Обработка формы
            document.getElementById('createBioForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('newUsername').value.trim();
                if (!username) {
                    showToast('❌ Введи ник!', true);
                    return;
                }

                const profiles = getProfiles();
                if (profiles[username.toLowerCase()]) {
                    showToast('❌ Это био уже существует!', true);
                    return;
                }

                // Проверяем лимит ещё раз
                if (getUserBio(currentUser)) {
                    showToast('❌ У тебя уже есть био! Можно создать только одно.', true);
                    renderDashboard();
                    return;
                }

                const image1File = document.getElementById('newImage1').files[0];
                const image2File = document.getElementById('newImage2').files[0];
                const reader1 = new FileReader();
                const reader2 = new FileReader();
                let image1Data = null;
                let image2Data = null;
                let loaded = 0;

                function checkAndSave() {
                    loaded++;
                    if (loaded === 2) {
                        saveBio(username, image1Data, image2Data);
                    }
                }

                if (image1File) {
                    reader1.onload = function(ev) { image1Data = ev.target.result;
                        checkAndSave(); };
                    reader1.readAsDataURL(image1File);
                } else {
                    checkAndSave();
                }

                if (image2File) {
                    reader2.onload = function(ev) { image2Data = ev.target.result;
                        checkAndSave(); };
                    reader2.readAsDataURL(image2File);
                } else {
                    checkAndSave();
                }

                function saveBio(username, img1, img2) {
                    const data = {
                        username: username,
                        description: document.getElementById('newDescription').value.trim(),
                        role: document.getElementById('newRole').value.trim() || 'Flipple Arcade',
                        textColor: document.getElementById('newTextColor').value,
                        owner: currentUser,
                        views: 0,
                        createdAt: new Date().toISOString(),
                        avatarType: 'emoji',
                        avatarEmoji: '🐱',
                        image1: img1 || null,
                        image2: img2 || null
                    };

                    profiles[username.toLowerCase()] = data;
                    saveProfiles(profiles);

                    showToast('✅ Био создано!');
                    sendTelegram(`📁 Новое био: ${username} (${currentUser})`);
                    renderDashboard();
                }
            });

            document.getElementById('backToDashboard').addEventListener('click', function() {
                renderDashboard();
            });
        }

        // ---- ОТОБРАЖЕНИЕ БИО (отдельная страница) ----
        function renderBioPage(username) {
            const profiles = getProfiles();
            const data = profiles[username.toLowerCase()];
            if (!data) {
                document.body.innerHTML = `
                    <div style="text-align:center;padding:2rem;">
                        <div style="font-size:4rem;margin-bottom:1rem;">🚀</div>
                        <h1 style="font-size:2rem;color:#ff6b6b;">404</h1>
                        <p style="color:rgba(255,255,255,0.5);">Био не найдено</p>
                        <a href="/" style="display:inline-block;margin-top:1rem;padding:0.6rem 1.5rem;border-radius:40px;background:linear-gradient(135deg,#4f7aff,#8b5cf6);color:#fff;text-decoration:none;">На главную</a>
                    </div>
                `;
                return;
            }

            // Увеличиваем просмотры
            data.views = (data.views || 0) + 1;
            profiles[username.toLowerCase()] = data;
            saveProfiles(profiles);

            const avatar = data.avatarType === 'emoji' ?
                data.avatarEmoji || '🐱' :
                (data.avatarData ? `<img src="${data.avatarData}" />` : '🐱');

            let imagesHTML = '';
            if (data.image1) {
                imagesHTML += `<div class="bio-image"><img src="${data.image1}" /></div>`;
            }
            if (data.image2) {
                imagesHTML += `<div class="bio-image"><img src="${data.image2}" /></div>`;
            }

            document.body.innerHTML = `
                <style>
                    .bio-page {
                        max-width: 500px;
                        width: 100%;
                        margin: 0 auto;
                        background: rgba(18,25,55,0.2);
                        backdrop-filter: blur(20px);
                        border: 1px solid rgba(255,255,255,0.04);
                        border-radius: 40px;
                        padding: 2rem 1.8rem;
                        box-shadow: 0 30px 80px rgba(0,0,0,0.4);
                        text-align: center;
                    }
                    .bio-page .avatar {
                        width: 90px;
                        height: 90px;
                        margin: 0 auto 0.8rem;
                        background: linear-gradient(135deg,#6c8cff,#a855f7);
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 2.5rem;
                        box-shadow: 0 8px 30px rgba(108,140,255,0.15);
                        border: 2px solid rgba(255,255,255,0.06);
                        overflow: hidden;
                    }
                    .bio-page .avatar img { width:100%; height:100%; object-fit:cover; }
                    .bio-page .name { font-size:1.6rem; font-weight:800; color:${data.textColor || '#ffffff'}; }
                    .bio-page .role { font-size:0.6rem; font-weight:600; color:rgba(255,255,255,0.3); letter-spacing:0.5px; text-transform:uppercase; margin-top:0.2rem; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.04); padding:0.2rem 1rem; border-radius:40px; display:inline-block; }
                    .bio-page .desc { color:${data.textColor || '#ffffff'}; font-size:0.9rem; line-height:1.6; margin:1rem 0 1.2rem; padding:0.8rem 1rem; background:rgba(0,10,30,0.15); border-radius:12px; border-left:2px solid rgba(108,140,255,0.15); opacity:0.85; }
                    .bio-page .images { display:flex; gap:0.8rem; flex-wrap:wrap; justify-content:center; margin:1rem 0; }
                    .bio-page .bio-image { width:100%; max-width:200px; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,0.04); }
                    .bio-page .bio-image img { width:100%; height:auto; display:block; }
                    .bio-page .footer { font-size:0.65rem; color:rgba(255,255,255,0.15); margin-top:1rem; display:flex; justify-content:center; gap:1rem; flex-wrap:wrap; }
                    .bio-page .footer span { color:rgba(255,255,255,0.1); }
                    .bio-page .back-btn { display:inline-block; margin-top:0.8rem; padding:0.4rem 1.2rem; border-radius:40px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.04); color:rgba(255,255,255,0.3); text-decoration:none; font-size:0.7rem; transition:0.3s; }
                    .bio-page .back-btn:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5); }
                </style>
                <div class="bio-page">
                    <div class="avatar">${avatar}</div>
                    <div class="name">${data.username}</div>
                    <div class="role">${data.role || 'Flipple Arcade'}</div>
                    ${data.description ? `<div class="desc">${data.description}</div>` : ''}
                    ${imagesHTML ? `<div class="images">${imagesHTML}</div>` : ''}
                    <div class="footer">
                        <span>👁️ ${data.views || 0} просмотров</span>
                        <span>📅 ${new Date(data.createdAt).toLocaleDateString()}</span>
                    </div>
                    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> На главную</a>
                </div>
            `;
        }

        // ---- РЕНДЕР СТРАНИЦ ----
        function renderLogin() {
            document.getElementById('mainCard').innerHTML = `
                <h1>🌌 AstroBio</h1>
                <div class="sub">Войди или создай аккаунт</div>

                <div class="tabs">
                    <div class="tab active" data-tab="login">Вход</div>
                    <div class="tab" data-tab="register">Регистрация</div>
                </div>

                <div class="tab-content active" id="tab-login">
                    <form id="loginForm">
                        <div class="form-group">
                            <label>👤 Логин</label>
                            <input type="text" id="loginUsername" placeholder="Твой ник" />
                        </div>
                        <div class="form-group">
                            <label>🔑 Пароль</label>
                            <input type="password" id="loginPassword" placeholder="Введи пароль" />
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Войти
                        </button>
                    </form>
                </div>

                <div class="tab-content" id="tab-register">
                    <form id="registerForm">
                        <div class="form-group">
                            <label>👤 Новый логин</label>
                            <input type="text" id="registerUsername" placeholder="Придумай ник" />
                        </div>
                        <div class="form-group">
                            <label>🔑 Пароль</label>
                            <input type="password" id="registerPassword" placeholder="Придумай пароль" />
                        </div>
                        <div class="form-group">
                            <label>🔑 Повтори пароль</label>
                            <input type="password" id="registerPassword2" placeholder="Повтори пароль" />
                        </div>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-user-plus"></i> Зарегистрироваться
                        </button>
                    </form>
                </div>

                <div class="switch-link" id="ownerHint" style="font-size:0.7rem; margin-top:1rem; color:rgba(255,255,255,0.1);">
                    Владелец: AstroKot_Owner
                </div>
            `;

            // Переключение вкладок
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
                });
            });

            // Логин
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                if (login(username, password)) {
                    showToast('✅ Вход выполнен!');
                    renderDashboard();
                } else {
                    showToast('❌ Неверный логин или пароль', true);
                }
            });

            // Регистрация
            document.getElementById('registerForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('registerUsername').value.trim();
                const password = document.getElementById('registerPassword').value.trim();
                const password2 = document.getElementById('registerPassword2').value.trim();

                if (!username || username.length < 2) {
                    showToast('❌ Логин должен быть минимум 2 символа', true);
                    return;
                }
                if (password.length < 4) {
                    showToast('❌ Пароль должен быть минимум 4 символа', true);
                    return;
                }
                if (password !== password2) {
                    showToast('❌ Пароли не совпадают', true);
                    return;
                }
                if (USERS[username]) {
                    showToast('❌ Этот логин уже занят', true);
                    return;
                }
                if (register(username, password)) {
                    showToast('✅ Аккаунт создан! Вход выполнен.');
                    renderDashboard();
                } else {
                    showToast('❌ Ошибка регистрации', true);
                }
            });
        }

        function renderDashboard() {
            const profiles = getProfiles();
            const keys = Object.keys(profiles);
            const currentUser = getCurrentUser();
            const isOwnerUser = isOwner();

            let listHTML = '';
            if (keys.length === 0) {
                listHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        Нет сохранённых био
                    </div>
                `;
            } else {
                let filteredKeys = keys;
                if (!isOwnerUser) {
                    filteredKeys = keys.filter(key => {
                        const bio = profiles[key];
                        return bio.owner === currentUser;
                    });
                }

                if (filteredKeys.length === 0) {
                    listHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            У тебя нет сохранённых био
                        </div>
                    `;
                } else {
                    listHTML = filteredKeys.map(key => {
                        const bio = profiles[key];
                        const avatar = bio.avatarType === 'emoji' ?
                            bio.avatarEmoji || '🐱' :
                            (bio.avatarData ? `<img src="${bio.avatarData}" />` : '🐱');
                        const isOwnerBio = isOwnerUser;
                        const isOwnBio = bio.owner === currentUser;

                        return `
                            <div class="bio-item">
                                <div class="info">
                                    <div class="avatar-mini">${avatar}</div>
                                    <div>
                                        <div class="name">${bio.username}</div>
                                        <div class="meta">
                                            👁️ ${bio.views || 0} просмотров · ${new Date(bio.createdAt).toLocaleDateString()}
                                            ${isOwnerBio && bio.owner && bio.owner !== currentUser ? ` · <span class="owner-badge">👑 ${bio.owner}</span>` : ''}
                                            ${isOwnBio ? ' · <span style="color:rgba(255,255,255,0.15);">твоё</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                                <div class="actions">
                                    <a href="/?profile=${bio.username}" target="_blank" class="view-btn">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    ${(isOwnerUser || isOwnBio) ? `<button class="del-btn" data-username="${bio.username}">
                                        <i class="fas fa-trash"></i>
                                    </button>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            }

            document.getElementById('mainCard').innerHTML = `
                <div class="profile-header">
                    <div>
                        <h2>🚀 Мои био</h2>
                        <div class="user-badge">${isOwnerUser ? '👑 Владелец' : '👤 ' + currentUser}</div>
                    </div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                </div>
                <div class="bio-list">
                    ${listHTML}
                </div>
                <div style="margin-top:1.5rem; display:flex; gap:0.8rem; flex-wrap:wrap;">
                    <button class="btn btn-primary" id="createBioBtn" style="flex:1; text-decoration:none; text-align:center;">
                        <i class="fas fa-plus"></i> Создать новое био
                    </button>
                    <button class="btn btn-outline" id="refreshBtn" style="flex:0 0 auto; width:auto; padding:0.8rem 1.2rem;">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
            `;

            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const username = this.dataset.username;
                    showConfirmModal(username);
                });
            });

            document.getElementById('logoutBtn').addEventListener('click', function() {
                logout();
                showToast('👋 Выход выполнен');
                renderLogin();
            });

            document.getElementById('refreshBtn').addEventListener('click', function() {
                renderDashboard();
                showToast('🔄 Обновлено');
            });

            document.getElementById('createBioBtn').addEventListener('click', function() {
                renderCreateBioForm();
            });
        }

        // ---- ЗАПУСК ----
        const params = new URLSearchParams(window.location.search);
        const profileName = params.get('profile');

        if (profileName) {
            renderBioPage(profileName);
        } else if (isLoggedIn()) {
            renderDashboard();
        } else {
            renderLogin();
        }
    </script>
</body>
</html>
