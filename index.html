<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroBio · Мои био</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 30% 20%, #0a0a1a, #050510);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            color: #fff;
            position: relative;
        }
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        .star-dot {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 860px;
            width: 100%;
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .warning-banner {
            grid-column: 1 / -1;
            background: rgba(255,50,50,0.08);
            border: 1px solid rgba(255,50,50,0.15);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(12px);
            animation: pulseWarning 2.5s infinite;
        }
        .warning-banner i { color: #ff4444; font-size: 1.1rem; }
        .warning-banner span { color: #ff8888; font-size: 0.85rem; font-weight: 500; }
        @keyframes pulseWarning {
            0%, 100% { border-color: rgba(255,50,50,0.15); }
            50% { border-color: rgba(255,50,50,0.4); }
        }

        .form-card {
            background: rgba(18,25,55,0.12);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 1.8rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-card::-webkit-scrollbar { width: 4px; }
        .form-card::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .form-card::-webkit-scrollbar-thumb { background: rgba(108,140,255,0.08); border-radius: 10px; }

        .form-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f9ff, #b6d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.2rem;
        }
        .form-card .sub {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.2);
            margin-bottom: 1.2rem;
        }

        .form-group { margin-bottom: 0.8rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.6rem 0.9rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(4px);
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: rgba(108,140,255,0.2);
            background: rgba(255,255,255,0.06);
        }
        .form-group textarea { resize: vertical; min-height: 60px; }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%;
            cursor: pointer;
        }
        .file-input-wrapper .fake-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .file-input-wrapper .fake-btn:hover { background: rgba(255,255,255,0.07); }
        .file-preview {
            margin-top: 0.3rem;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .file-preview .preview-thumb {
            width: 60px; height: 60px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.04);
            position: relative;
        }
        .file-preview .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .file-preview .preview-thumb .remove-img {
            position: absolute;
            top: 2px; right: 2px;
            background: rgba(239,68,68,0.8);
            border: none;
            color: #fff;
            border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .color-options {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 0.2rem;
        }
        .color-options .color-btn {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .color-options .color-btn:hover { transform: scale(1.1); }
        .color-options .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.08);
        }
        .color-options .color-btn.active::after {
            content: '✓';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 0.8rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.9);
        }
        .color-options .color-btn input[type="radio"] { display: none; }

        .link-block {
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            align-items: center;
        }
        .link-block .platform-icon {
            font-size: 0.7rem;
            font-weight: 600;
            color: rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .link-block .platform-icon i { width: 16px; color: #a855f7; font-size: 0.8rem; }
        .link-block input {
            padding: 0.4rem 0.7rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            color: #fff;
            font-size: 0.75rem;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }
        .link-block input:focus {
            border-color: rgba(108,140,255,0.15);
            background: rgba(255,255,255,0.05);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            width: 100%;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: rgba(79,122,255,0.15);
            border: 1px solid rgba(79,122,255,0.15);
        }
        .btn-primary:hover {
            background: rgba(79,122,255,0.25);
            border-color: rgba(79,122,255,0.25);
            transform: translateY(-2px);
        }
        .btn-success {
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.12);
        }
        .btn-success:hover {
            background: rgba(16,185,129,0.2);
            border-color: rgba(16,185,129,0.2);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.4);
        }
        .btn-outline:hover { background: rgba(255,255,255,0.06); }
        .btn-danger {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.12);
        }
        .btn-danger:hover {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.2);
            transform: translateY(-2px);
        }

        /* ---- ПРЕДПРОСМОТР ---- */
        .preview-card {
            background: rgba(18,25,55,0.08);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 1.5rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 30px 80px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 300px;
            position: relative;
            overflow: hidden;
        }
        .preview-card .preview-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            transition: all 0.5s ease;
        }
        .preview-card .preview-content {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
        }
        .preview-card .preview-avatar {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c8cff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 0.5rem;
            box-shadow: 0 8px 30px rgba(108,140,255,0.08);
            border: 2px solid rgba(255,255,255,0.04);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .preview-card .preview-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .preview-card .preview-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            transition: color 0.3s ease;
        }
        .preview-card .preview-role {
            font-size: 0.55rem;
            font-weight: 600;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 0.1rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 0.15rem 0.8rem;
            border-radius: 40px;
            display: inline-block;
        }
        .preview-card .preview-desc {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin: 0.5rem 0 0.8rem;
            padding: 0.4rem 0.8rem;
            background: rgba(0,10,30,0.08);
            border-radius: 10px;
            border-left: 2px solid rgba(108,140,255,0.08);
            min-height: 30px;
            transition: all 0.3s ease;
            text-align: left;
            line-height: 1.6;
        }

        .preview-card .preview-gallery {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 0.5rem 0;
            width: 100%;
        }
        .preview-card .preview-gallery .gallery-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .preview-card .preview-gallery .gallery-img img { width: 100%; height: 100%; object-fit: cover; }

        .preview-card .preview-socials {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            justify-content: center;
            margin: 0.3rem 0;
            width: 100%;
        }
        .preview-card .preview-socials .ps-btn {
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.25);
            font-size: 0.6rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: 0.3s;
            text-decoration: none;
        }
        .preview-card .preview-socials .ps-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); }
        .preview-card .preview-socials .ps-btn i { color: rgba(255,255,255,0.15); font-size: 0.6rem; }

        .preview-label {
            position: absolute;
            top: 0.5rem;
            right: 0.8rem;
            font-size: 0.5rem;
            color: rgba(255,255,255,0.05);
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 2;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(16,185,129,0.8);
            backdrop-filter: blur(16px);
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
            font-size: 0.85rem;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(239,68,68,0.8); }

        @media (max-width: 720px) {
            .container { grid-template-columns: 1fr; gap: 1rem; }
            .preview-card { min-height: 200px; }
            .form-card { max-height: none; }
        }
        @media (max-width: 480px) {
            .form-card { padding: 1.2rem 1rem; border-radius: 24px; }
            .preview-card { padding: 1rem 0.8rem; border-radius: 24px; min-height: 160px; }
            .preview-card .preview-avatar { width: 55px; height: 55px; font-size: 1.5rem; }
            .preview-card .preview-name { font-size: 1rem; }
            .link-block { grid-template-columns: 1fr; gap: 0.2rem; }
        }
    </style>
</head>
<body>

    <div class="stars-bg" id="starsBg"></div>

    <div class="container">
        <div class="warning-banner">
            <i class="fas fa-triangle-exclamation"></i>
            <span>⚠️ Сайт может быть нестабильным. Сохраняй свои био и ссылки!</span>
        </div>

        <div class="form-card" id="formCard">
            <h2>✨ Создать био</h2>
            <div class="sub">Заполни поля — справа будет предпросмотр</div>
            <div id="formContent">
                <!-- Контент через JS -->
            </div>
        </div>

        <div class="preview-card" id="previewCard">
            <span class="preview-label">👁️ предпросмотр</span>
            <div class="preview-bg" id="previewBg" style="background:#0b0f2a;"></div>
            <div class="preview-content" id="previewContent">
                <div class="preview-avatar" id="previewAvatar">🐱</div>
                <div class="preview-name" id="previewName">Твой ник</div>
                <div class="preview-role" id="previewRole">Твоя роль</div>
                <div class="preview-desc" id="previewDesc">Твоё описание появится здесь</div>
                <div class="preview-gallery" id="previewGallery"></div>
                <div class="preview-socials" id="previewSocials"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ---- ЗВЁЗДЫ ----
        (function() {
            const c = document.getElementById('starsBg');
            for (let i = 0; i < 100; i++) {
                const s = document.createElement('div');
                s.className = 'star-dot';
                const size = Math.random() * 2 + 0.5;
                s.style.cssText =
                    `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*4+2}s;animation-delay:${Math.random()*5}s;opacity:${Math.random()*0.5+0.1};`;
                c.appendChild(s);
            }
        })();

        // ---- TOAST ----
        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.className = 'toast' + (isError ? ' error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ---- ОСНОВНАЯ ЛОГИКА ----
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('formContent');

            let bioData = {
                username: '',
                description: '',
                role: '',
                avatarType: 'emoji',
                avatarEmoji: '🐱',
                avatarData: null,
                bgColor: '#0b0f2a',
                bgImage: null,
                bgStyle: 'default',
                textColor: '#ffffff',
                images: [],
                links: {}
            };

            // ---- СПИСОК СОЦСЕТЕЙ ----
            const socialKeys = ['discord', 'twitch', 'youtube', 'telegram', 'github', 'vk', 'tiktok', 'twitter', 'instagram', 'steam', 'flipple'];
            const socialIcons = {
                discord: 'fab fa-discord',
                twitch: 'fab fa-twitch',
                youtube: 'fab fa-youtube',
                telegram: 'fab fa-telegram',
                github: 'fab fa-github',
                vk: 'fab fa-vk',
                tiktok: 'fab fa-tiktok',
                twitter: 'fab fa-twitter',
                instagram: 'fab fa-instagram',
                steam: 'fab fa-steam',
                flipple: 'fas fa-rocket'
            };
            const socialLabels = {
                discord: 'Discord',
                twitch: 'Twitch',
                youtube: 'YouTube',
                telegram: 'Telegram',
                github: 'GitHub',
                vk: 'VK',
                tiktok: 'TikTok',
                twitter: 'Twitter',
                instagram: 'Instagram',
                steam: 'Steam',
                flipple: 'Flipple Arcade'
            };

            // ---- ОБНОВЛЕНИЕ ПРЕДПРОСМОТРА ----
            function updatePreview() {
                // Аватарка
                const avatarEl = document.getElementById('previewAvatar');
                if (bioData.avatarType === 'emoji') {
                    avatarEl.innerHTML = bioData.avatarEmoji || '🐱';
                    avatarEl.style.fontSize = '2rem';
                } else if (bioData.avatarData) {
                    avatarEl.innerHTML = `<img src="${bioData.avatarData}" />`;
                }

                // Ник, роль, описание
                document.getElementById('previewName').textContent = bioData.username || 'Твой ник';
                document.getElementById('previewName').style.color = bioData.textColor || '#ffffff';
                document.getElementById('previewRole').textContent = bioData.role || 'Твоя роль';
                document.getElementById('previewDesc').textContent = bioData.description || 'Твоё описание появится здесь';
                document.getElementById('previewDesc').style.color = bioData.textColor || '#ffffff';

                // Фон
                const bg = document.getElementById('previewBg');
                if (bioData.bgImage) {
                    bg.style.background = `url(${bioData.bgImage}) center/cover no-repeat`;
                } else if (bioData.bgStyle === 'galaxy') {
                    bg.style.background = 'radial-gradient(circle at 30% 20%, #1a0a2e, #0b0f2a)';
                } else if (bioData.bgStyle === 'sunset') {
                    bg.style.background = 'radial-gradient(circle at 30% 20%, #2e0a1a, #1a0a0a)';
                } else if (bioData.bgStyle === 'ocean') {
                    bg.style.background = 'radial-gradient(circle at 30% 20%, #0a1a2e, #0a0a1a)';
                } else if (bioData.bgStyle === 'forest') {
                    bg.style.background = 'radial-gradient(circle at 30% 20%, #0a2e1a, #0a1a0a)';
                } else {
                    bg.style.background = bioData.bgColor || '#0b0f2a';
                }

                // Галерея картинок
                const galleryEl = document.getElementById('previewGallery');
                let galleryHTML = '';
                for (const img of bioData.images) {
                    if (img) {
                        galleryHTML += `<div class="gallery-img"><img src="${img}" /></div>`;
                    }
                }
                galleryEl.innerHTML = galleryHTML;

                // Соцсети
                const socialsEl = document.getElementById('previewSocials');
                let socialHTML = '';
                for (const [key, val] of Object.entries(bioData.links)) {
                    if (val && val.trim()) {
                        const icon = socialIcons[key] || 'fas fa-link';
                        const label = socialLabels[key] || key;
                        socialHTML +=
                            `<a href="${val}" target="_blank" class="ps-btn"><i class="${icon}"></i> ${label}</a>`;
                    }
                }
                socialsEl.innerHTML = socialHTML || '<span style="color:rgba(255,255,255,0.08);font-size:0.6rem;">Нет ссылок</span>';
            }

            // ---- ГЕНЕРАЦИЯ ФОРМЫ ----
            function renderForm() {
                let socialFields = '';
                for (const key of socialKeys) {
                    const icon = socialIcons[key] || 'fas fa-link';
                    const label = socialLabels[key] || key;
                    const placeholder = key === 'flipple' ? 'https://flipplearcade.com/u/...' : `https://${key}.com/...`;
                    socialFields += `
                        <div class="link-block">
                            <span class="platform-icon"><i class="${icon}"></i> ${label}</span>
                            <input type="url" id="link_${key}" placeholder="${placeholder}" value="${bioData.links[key] || ''}" />
                        </div>
                    `;
                }

                form.innerHTML = `
                    <div class="form-group">
                        <label>📛 Ник *</label>
                        <input type="text" id="bioUsername" placeholder="Твой ник" value="${bioData.username || ''}" />
                    </div>
                    <div class="form-group">
                        <label>🖼️ Аватарка</label>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;">
                            <div class="file-input-wrapper">
                                <div class="fake-btn"><i class="fas fa-upload"></i> Загрузить фото</div>
                                <input type="file" id="avatarFile" accept="image/*" />
                            </div>
                            <select id="avatarEmoji" style="width:100%; padding:0.5rem 0.8rem; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.05); color:#fff; font-size:1.2rem; outline:none;">

                let socialHTML = '';
                for (const [key, val] of Object.entries(bioData.links)) {
