<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroBio · Создай свой профиль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0b0f2a, #030514);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            color: #fff;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .card {
            background: rgba(18, 25, 55, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(120, 180, 255, 0.15);
            border-radius: 48px;
            padding: 2.5rem 2rem 2.2rem;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #b6d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            text-align: center;
            color: #9ab3ff;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
            padding-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #d3e2ff;
            margin-bottom: 0.3rem;
        }

        .form-group label .optional {
            color: #6a7fa0;
            font-weight: 400;
            font-size: 0.8rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: rgba(108, 140, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #4a5a7a;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #cdb4ff;
            margin: 1.5rem 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #a855f7;
        }

        .link-block {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 0.6rem;
            margin-bottom: 0.6rem;
            align-items: center;
        }

        .link-block .platform-icon {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9ab3ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .link-block .platform-icon i {
            width: 20px;
            color: #a855f7;
        }

        .link-block input {
            padding: 0.6rem 0.9rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }

        .link-block input:focus {
            border-color: rgba(108, 140, 255, 0.3);
            background: rgba(255, 255, 255, 0.07);
        }

        .link-block input::placeholder {
            color: #3a4a6a;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: 0.2s ease;
            text-decoration: none;
            color: #fff;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f7aff, #8b5cf6);
            box-shadow: 0 6px 20px rgba(79, 122, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(79, 122, 255, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #34d399);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.25);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(16, 185, 129, 0.4);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
        }

        .profile-link {
            margin-top: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            word-break: break-all;
        }

        .profile-link span {
            color: #9ab3ff;
            font-size: 0.85rem;
        }

        .profile-link a {
            color: #6c8cff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .profile-link a:hover {
            text-decoration: underline;
        }

        .profile-link .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #9ab3ff;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .profile-link .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 600px) {
            .card { padding: 1.8rem 1.2rem; }
            .link-block { grid-template-columns: 1fr; gap: 0.3rem; }
            .link-block .platform-icon { font-size: 0.8rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>✨ AstroBio</h1>
            <div class="subtitle">Создай свой космический профиль для Flipple Arcade</div>

            <!-- ФОРМА -->
            <form id="bioForm">
                <!-- Ник -->
                <div class="form-group">
                    <label>📛 Ник <span style="color:#ff6b6b;">*</span></label>
                    <input type="text" id="username" placeholder="Введи свой ник (например: Myrka)" required />
                </div>

                <!-- Аватарка -->
                <div class="form-group">
                    <label>🖼️ Аватарка <span class="optional">(ссылка на картинку)</span></label>
                    <input type="url" id="avatar" placeholder="https://i.imgur.com/..." />
                </div>

                <!-- Описание -->
                <div class="form-group">
                    <label>📝 Описание</label>
                    <textarea id="description" placeholder="Расскажи о себе..."></textarea>
                </div>

                <!-- ССЫЛКИ -->
                <div class="section-title"><i class="fas fa-link"></i> Ссылки (заполни то, что нужно)</div>

                <div class="link-block">
                    <span class="platform-icon"><i class="fab fa-discord"></i> Discord</span>
                    <input type="url" id="link_discord" placeholder="https://discord.gg/..." />
                </div>

                <div class="link-block">
                    <span class="platform-icon"><i class="fab fa-twitch"></i> Twitch</span>
                    <input type="url" id="link_twitch" placeholder="https://twitch.tv/..." />
                </div>

                <div class="link-block">
                    <span class="platform-icon"><i class="fab fa-youtube"></i> YouTube</span>
                    <input type="url" id="link_youtube" placeholder="https://youtube.com/..." />
                </div>

                <div class="link-block">
                    <span class="platform-icon"><i class="fab fa-telegram"></i> Telegram</span>
                    <input type="url" id="link_telegram" placeholder="https://t.me/..." />
                </div>

                <div class="link-block">
                    <span class="platform-icon"><i class="fab fa-tiktok"></i> TikTok</span>
                    <input type="url" id="link_tiktok" placeholder="https://tiktok.com/..." />
                </div>

                <div class="link-block">
                    <span class="platform-icon"><i class="fab fa-github"></i> GitHub</span>
                    <input type="url" id="link_github" placeholder="https://github.com/..." />
                </div>

                <!-- Кастомная ссылка -->
                <div class="section-title" style="margin-top:0.5rem;"><i class="fas fa-plus-circle"></i> Своя ссылка</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.6rem;">
                    <input type="text" id="custom_name" placeholder="Название (например: Сайт)" style="padding:0.6rem 0.9rem; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); color:#fff; outline:none;" />
                    <input type="url" id="custom_url" placeholder="https://..." style="padding:0.6rem 0.9rem; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); color:#fff; outline:none;" />
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top:1.5rem;">
                    <i class="fas fa-rocket"></i> Создать профиль
                </button>
            </form>

            <!-- РЕЗУЛЬТАТ (появляется после создания) -->
            <div id="result" style="display:none; margin-top:1.5rem; border-top:1px solid rgba(255,255,255,0.05); padding-top:1.5rem;">
                <div style="text-align:center; font-size:1.1rem; font-weight:700; color:#34d399; margin-bottom:0.5rem;">
                    ✅ Профиль создан!
                </div>
                <div class="profile-link">
                    <span>🔗 Твоя ссылка:</span>
                    <a href="#" id="profileUrl" target="_blank">загрузка...</a>
                    <button class="copy-btn" id="copyBtn">📋 Копировать</button>
                </div>
                <button class="btn btn-outline" id="viewProfileBtn" style="margin-top:0.8rem;">
                    <i class="fas fa-eye"></i> Открыть профиль
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ----- ТВОИ ДАННЫЕ ДЛЯ TELEGRAM -----
        const BOT_TOKEN = '8961365984:AAFmWGgNf8IjhHxKBmUxNl3cuYX6cYOHl0Q';
        const CHAT_ID = '5577770421';
        // ------------------------------------

        // Элементы
        const form = document.getElementById('bioForm');
        const result = document.getElementById('result');
        const profileUrl = document.getElementById('profileUrl');
        const copyBtn = document.getElementById('copyBtn');
        const viewProfileBtn = document.getElementById('viewProfileBtn');
        const toast = document.getElementById('toast');

        // Поля
        const usernameInput = document.getElementById('username');
        const avatarInput = document.getElementById('avatar');
        const descriptionInput = document.getElementById('description');

        const linkFields = {
            discord: document.getElementById('link_discord'),
            twitch: document.getElementById('link_twitch'),
            youtube: document.getElementById('link_youtube'),
            telegram: document.getElementById('link_telegram'),
            tiktok: document.getElementById('link_tiktok'),
            github: document.getElementById('link_github'),
        };

        const customName = document.getElementById('custom_name');
        const customUrl = document.getElementById('custom_url');

        // Показываем тост
        function showToast(text, isError = false) {
            toast.textContent = text;
            toast.style.background = isError ? 'rgba(239,68,68,0.9)' : 'rgba(16,185,129,0.9)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Генерация HTML-профиля
        function generateProfileHTML(data) {
            const links = data.links || {};
            const customLink = data.customLink;

            let buttonsHTML = '';
            const linkIcons = {
                discord: 'fab fa-discord',
                twitch: 'fab fa-twitch',
                youtube: 'fab fa-youtube',
                telegram: 'fab fa-telegram',
                tiktok: 'fab fa-tiktok',
                github: 'fab fa-github',
            };

            const linkLabels = {
                discord: 'Discord',
                twitch: 'Twitch',
                youtube: 'YouTube',
                telegram: 'Telegram',
                tiktok: 'TikTok',
                github: 'GitHub',
            };

            // Стандартные ссылки
            for (const [key, value] of Object.entries(links)) {
                if (value && value.trim()) {
                    const icon = linkIcons[key] || 'fas fa-link';
                    const label = linkLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                    buttonsHTML += `<a href="${value}" target="_blank" class="btn" style="margin-bottom:0.6rem;"><i class="${icon}"></i> ${label}</a>`;
                }
            }

            // Кастомная ссылка
            if (customLink && customLink.name && customLink.url) {
                buttonsHTML += `<a href="${customLink.url}" target="_blank" class="btn" style="margin-bottom:0.6rem;"><i class="fas fa-link"></i> ${customLink.name}</a>`;
            }

            const avatarHTML = data.avatar ? 
                `<div class="avatar"><img src="${data.avatar}" alt="${data.username}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" /></div>` :
                `<div class="avatar" style="font-size:3rem;">🐱</div>`;

            return `
        <!DOCTYPE html>
        <html lang="ru">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>${data.username} · AstroBio</title>
            <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
            <style>
                * { margin:0; padding:0; box-sizing:border-box; }
                body {
                    background: radial-gradient(circle at 30% 20%, #0b0f2a, #030514);
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-family: 'Inter', sans-serif;
                    padding: 1.5rem;
                    color: #fff;
                }
                .card {
                    max-width: 480px;
                    width: 100%;
                    background: rgba(18, 25, 55, 0.55);
                    backdrop-filter: blur(12px);
                    border: 1px solid rgba(120, 180, 255, 0.15);
                    border-radius: 48px;
                    padding: 2.5rem 2rem 2.2rem;
                    box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8);
                    text-align: center;
                }
                .avatar {
                    width: 110px;
                    height: 110px;
                    margin: 0 auto 1.2rem;
                    background: linear-gradient(135deg, #6c8cff, #a855f7);
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 3.2rem;
                    font-weight: 800;
                    color: #fff;
                    box-shadow: 0 8px 30px rgba(108, 140, 255, 0.35);
                    border: 2px solid rgba(255, 255, 255, 0.2);
                    overflow: hidden;
                }
                .name {
                    font-size: 2rem;
                    font-weight: 800;
                    background: linear-gradient(135deg, #f0f9ff, #b6d4ff);
                    -webkit-background-clip: text;
                    background-clip: text;
                    color: transparent;
                }
                .badge {
                    display: inline-block;
                    font-size: 0.65rem;
                    font-weight: 700;
                    background: rgba(168, 85, 247, 0.2);
                    border: 1px solid rgba(168, 85, 247, 0.4);
                    padding: 0.25rem 1rem;
                    border-radius: 40px;
                    color: #cdb4ff;
                    letter-spacing: 0.5px;
                    text-transform: uppercase;
                    margin-top: 0.3rem;
                }
                .desc {
                    color: #d3e2ff;
                    font-size: 0.95rem;
                    line-height: 1.6;
                    margin: 1rem 0 1.5rem 0;
                    padding: 1rem;
                    background: rgba(0, 10, 30, 0.3);
                    border-radius: 16px;
                    border-left: 3px solid #6c8cff;
                }
                .links {
                    display: flex;
                    flex-direction: column;
                    gap: 0.6rem;
                }
                .btn {
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 10px;
                    padding: 0.8rem;
                    border-radius: 60px;
                    background: rgba(255, 255, 255, 0.04);
                    border: 1px solid rgba(255, 255, 255, 0.07);
                    color: #d3e2ff;
                    text-decoration: none;
                    font-weight: 600;
                    font-size: 0.95rem;
                    transition: 0.2s ease;
                }
                .btn:hover {
                    background: rgba(108, 140, 255, 0.13);
                    border-color: rgba(108, 140, 255, 0.25);
                    transform: scale(1.01);
                }
                .btn i { width: 24px; color: #8ab4ff; }
                .footer {
                    margin-top: 1.5rem;
                    font-size: 0.7rem;
                    color: rgba(255, 255, 255, 0.15);
                }
                @media (max-width: 480px) {
                    .card { padding: 1.8rem 1.2rem; }
                    .name { font-size: 1.5rem; }
                    .avatar { width: 85px; height: 85px; font-size: 2.5rem; }
                }
            </style>
        </head>
        <body>
            <div class="card">
                ${avatarHTML}
                <div class="name">${data.username}</div>
                <div class="badge"><i class="fas fa-rocket" style="margin-right:5px;"></i> Flipple Arcade</div>
                ${data.description ? `<div class="desc">${data.description}</div>` : ''}
                ${buttonsHTML ? `<div class="links">${buttonsHTML}</div>` : ''}
                <div class="footer"><i class="fas fa-crown"></i> Сделано в AstroBio · ${new Date().toLocaleDateString()}</div>
            </div>
        </body>
        </html>
            `;
        }

        // Отправка в Telegram
        function sendToTelegram(html) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    document: `data:text/html;base64,${btoa(unescape(encodeURIComponent(html)))}`,
                    filename: `profile_${Date.now()}.html`,
                    caption: `📁 Новый профиль создан!\n👤 Ник: ${usernameInput.value}\n🔗 Ссылка: ${window.location.origin}/?profile=${usernameInput.value}`
                })
            }).then(res => {
                if (res.ok) showToast('📤 HTML-версия отправлена в Telegram!');
                else showToast('⚠️ Ошибка отправки в Telegram', true);
            }).catch(() => showToast('⚠️ Ошибка отправки в Telegram', true));
        }

        // Сохраняем профиль в localStorage
        function saveProfile(data) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            profiles[data.username.toLowerCase()] = data;
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        // Получить профиль по нику
        function getProfile(username) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            return profiles[username.toLowerCase()] || null;
        }

        // Загрузить профиль из URL
        function loadProfileFromURL() {
            const params = new URLSearchParams(window.location.search);
            const username = params.get('profile');
            if (username) {
                const data = getProfile(username);
                if (data) {
                    document.write(generateProfileHTML(data));
                    document.close();
                    return true;
                } else {
                    showToast('❌ Профиль не найден!', true);
                    return false;
                }
            }
            return false;
        }

        // Создание профиля
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            if (!username) {
                showToast('❌ Введи ник!', true);
                return;
            }

            // Проверяем, не занят ли ник
            if (getProfile(username)) {
                showToast('❌ Этот ник уже занят!', true);
                return;
            }

            const data = {
                username: username,
                avatar: avatarInput.value.trim(),
                description: descriptionInput.value.trim(),
                links: {},
                customLink: null,
                createdAt: new Date().toISOString()
            };

            // Собираем ссылки
            for (const [key, field] of Object.entries(linkFields)) {
                const val = field.value.trim();
                if (val) data.links[key] = val;
            }

            // Кастомная ссылка
            if (customName.value.trim() && customUrl.value.trim()) {
                data.customLink = {
                    name: customName.value.trim(),
                    url: customUrl.value.trim()
                };
            }

            // Сохраняем
            saveProfile(data);

            // Генерируем HTML
            const html = generateProfileHTML(data);

            // Отправляем в Telegram
            sendToTelegram(html);

            // Показываем результат
            const url = `${window.location.origin}?profile=${username}`;
            profileUrl.href = url;
            profileUrl.textContent = url;
            result.style.display = 'block';

            // Очищаем форму
            form.reset();

            showToast('✅ Профиль создан!');
        });

        // Копировать ссылку
        copyBtn.addEventListener('click', function() {
            navigator.clipboard.writeText(profileUrl.href).then(() => {
                showToast('📋 Ссылка скопирована!');
            }).catch(() => {
                // fallback
                const range = document.createRange();
                range.selectNode(profileUrl);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                showToast('📋 Ссылка скопирована!');
            });
        });

        // Открыть профиль
        viewProfileBtn.addEventListener('click', function() {
            window.open(profileUrl.href, '_blank');
        });

        // При загрузке проверяем URL
        if (!loadProfileFromURL()) {
            // Если профиля нет в URL — показываем форму
            console.log('Создай свой профиль!');
        }
    </script>

</body>
</html>
