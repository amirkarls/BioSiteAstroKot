<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroBio · Космический профиль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 30% 20%, #0b0f2a, #030514);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            color: #fff;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        .container {
            max-width: 700px;
            width: 100%;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(18, 25, 55, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(120, 180, 255, 0.12);
            border-radius: 48px;
            padding: 2.5rem 2rem 2.2rem;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            transition: 0.4s;
        }

        .card:hover {
            border-color: rgba(120, 180, 255, 0.2);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #b6d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            text-align: center;
            color: #9ab3ff;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
            padding-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #d3e2ff;
            margin-bottom: 0.3rem;
        }

        .form-group label .optional {
            color: #6a7fa0;
            font-weight: 400;
            font-size: 0.8rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: rgba(108, 140, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 25px rgba(108, 140, 255, 0.05);
            transform: scale(1.005);
        }

        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #4a5a7a;
        }

        .avatar-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .avatar-section .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .avatar-section .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .avatar-section .file-input-wrapper .fake-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.8rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #9ab3ff;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.3s;
            cursor: pointer;
        }

        .avatar-section .file-input-wrapper .fake-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        .avatar-section .emoji-select {
            padding: 0.8rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .avatar-section .emoji-select:focus {
            border-color: rgba(108, 140, 255, 0.5);
        }

        .avatar-preview {
            margin-top: 0.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.6rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .avatar-preview:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .avatar-preview .preview-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c8cff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            overflow: hidden;
            flex-shrink: 0;
            transition: 0.3s;
        }

        .avatar-preview .preview-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-preview .preview-text {
            color: #6a7fa0;
            font-size: 0.8rem;
        }

        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }

        .color-options .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .color-options .color-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);
        }

        .color-options .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .color-options .color-btn.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .color-options .color-btn input[type="radio"] {
            display: none;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #cdb4ff;
            margin: 1.5rem 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #a855f7;
        }

        .link-block {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 0.6rem;
            margin-bottom: 0.6rem;
            align-items: center;
        }

        .link-block .platform-icon {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9ab3ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .link-block .platform-icon i {
            width: 20px;
            color: #a855f7;
        }

        .link-block input {
            padding: 0.6rem 0.9rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
            width: 100%;
        }

        .link-block input:focus {
            border-color: rgba(108, 140, 255, 0.4);
            background: rgba(255, 255, 255, 0.07);
        }

        .link-block input::placeholder {
            color: #3a4a6a;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: 0.3s ease;
            text-decoration: none;
            color: #fff;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0;
            transition: 0.5s;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f7aff, #8b5cf6);
            box-shadow: 0 6px 25px rgba(79, 122, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(79, 122, 255, 0.4);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 6px 25px rgba(239, 68, 68, 0.25);
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(239, 68, 68, 0.4);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
        }

        .profile-link {
            margin-top: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            word-break: break-all;
            flex-wrap: wrap;
            transition: 0.3s;
        }

        .profile-link:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .profile-link span {
            color: #9ab3ff;
            font-size: 0.85rem;
        }

        .profile-link a {
            color: #6c8cff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .profile-link a:hover {
            text-decoration: underline;
        }

        .profile-link .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #9ab3ff;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .profile-link .copy-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        .admin-panel {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-panel summary {
            color: #6a7fa0;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: center;
            padding: 0.5rem;
            transition: 0.3s;
        }

        .admin-panel summary:hover {
            color: #9ab3ff;
        }

        .admin-panel .admin-content {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        @media (max-width: 600px) {
            .card { padding: 1.8rem 1.2rem; }
            .link-block { grid-template-columns: 1fr; gap: 0.3rem; }
            .link-block .platform-icon { font-size: 0.8rem; }
            h1 { font-size: 1.5rem; }
            .avatar-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="mainCard">
            <!-- Контент вставляется через JS -->
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  ТВОИ ДАННЫЕ ДЛЯ TELEGRAM
        // ============================================================
        const BOT_TOKEN = '8961365984:AAFmWGgNf8IjhHxKBmUxNl3cuYX6cYOHl0Q';
        const CHAT_ID = '5577770421';
        // ============================================================

        function showToast(text, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function getProfile(username) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            return profiles[username.toLowerCase()] || null;
        }

        function saveProfile(data) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            profiles[data.username.toLowerCase()] = data;
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        function deleteProfile(username) {
            const profiles = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            delete profiles[username.toLowerCase()];
            localStorage.setItem('astroBioProfiles', JSON.stringify(profiles));
        }

        function getAllProfiles() {
            return JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
        }

        // --- ГЕНЕРАЦИЯ HTML-ПРОФИЛЯ ---
        function generateProfileHTML(data) {
            const links = data.links || {};
            const customLink = data.customLink;

            const linkIcons = {
                discord: 'fab fa-discord',
                twitch: 'fab fa-twitch',
                youtube: 'fab fa-youtube',
                telegram: 'fab fa-telegram',
                tiktok: 'fab fa-tiktok',
                github: 'fab fa-github',
                vk: 'fab fa-vk',
                steam: 'fab fa-steam',
                twitter: 'fab fa-twitter',
                instagram: 'fab fa-instagram'
            };

            const linkLabels = {
                discord: 'Discord',
                twitch: 'Twitch',
                youtube: 'YouTube',
                telegram: 'Telegram',
                tiktok: 'TikTok',
                github: 'GitHub',
                vk: 'VK',
                steam: 'Steam',
                twitter: 'Twitter',
                instagram: 'Instagram'
            };

            let buttonsHTML = '';
            for (const [key, value] of Object.entries(links)) {
                if (value && value.trim()) {
                    const icon = linkIcons[key] || 'fas fa-link';
                    const label = linkLabels[key] || key.charAt(0).toUpperCase() + key.slice(1);
                    buttonsHTML += `<a href="${value}" target="_blank" class="btn" style="margin-bottom:0.6rem;"><i class="${icon}"></i> ${label}</a>`;
                }
            }

            if (customLink && customLink.name && customLink.url) {
                buttonsHTML += `<a href="${customLink.url}" target="_blank" class="btn" style="margin-bottom:0.6rem;"><i class="fas fa-link"></i> ${customLink.name}</a>`;
            }

            let avatarHTML = '';
            if (data.avatarType === 'emoji') {
                avatarHTML = `<div class="avatar" style="font-size:3.2rem;">${data.avatarEmoji || '🐱'}</div>`;
            } else if (data.avatarType === 'image' && data.avatarData) {
                avatarHTML = `<div class="avatar"><img src="${data.avatarData}" alt="${data.username}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" /></div>`;
            } else {
                avatarHTML = `<div class="avatar" style="font-size:3.2rem;">🐱</div>`;
            }

            return `<!DOCTYPE html>
        <html lang="ru">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>${data.username} · AstroBio</title>
            <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
            <style>
                * { margin:0; padding:0; box-sizing:border-box; }
                body {
                    background: ${data.bgColor || '#0b0f2a'};
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-family: 'Inter', sans-serif;
                    padding: 1.5rem;
                    color: #fff;
                    animation: fadeIn 0.8s ease;
                }
                @keyframes fadeIn {
                    0% { opacity: 0; transform: scale(0.97); }
                    100% { opacity: 1; transform: scale(1); }
                }
                .card {
                    max-width: 480px;
                    width: 100%;
                    background: rgba(18, 25, 55, 0.55);
                    backdrop-filter: blur(12px);
                    border: 1px solid rgba(120, 180, 255, 0.12);
                    border-radius: 48px;
                    padding: 2.5rem 2rem 2.2rem;
                    box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8);
                    text-align: center;
                    animation: slideUp 0.6s ease;
                }
                @keyframes slideUp {
                    0% { opacity: 0; transform: translateY(30px); }
                    100% { opacity: 1; transform: translateY(0); }
                }
                .avatar {
                    width: 110px;
                    height: 110px;
                    margin: 0 auto 1.2rem;
                    background: linear-gradient(135deg, #6c8cff, #a855f7);
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: 800;
                    color: #fff;
                    box-shadow: 0 8px 30px rgba(108, 140, 255, 0.35);
                    border: 2px solid rgba(255, 255, 255, 0.2);
                    overflow: hidden;
                }
                .name {
                    font-size: 2rem;
                    font-weight: 800;
                    background: linear-gradient(135deg, #f0f9ff, #b6d4ff);
                    -webkit-background-clip: text;
                    background-clip: text;
                    color: transparent;
                }
                .badge {
                    display: inline-block;
                    font-size: 0.65rem;
                    font-weight: 700;
                    background: rgba(168, 85, 247, 0.2);
                    border: 1px solid rgba(168, 85, 247, 0.4);
                    padding: 0.25rem 1rem;
                    border-radius: 40px;
                    color: #cdb4ff;
                    letter-spacing: 0.5px;
                    text-transform: uppercase;
                    margin-top: 0.3rem;
                }
                .desc {
                    color: #d3e2ff;
                    font-size: 0.95rem;
                    line-height: 1.6;
                    margin: 1rem 0 1.5rem 0;
                    padding: 1rem;
                    background: rgba(0, 10, 30, 0.3);
                    border-radius: 16px;
                    border-left: 3px solid #6c8cff;
                }
                .links {
                    display: flex;
                    flex-direction: column;
                    gap: 0.6rem;
                }
                .btn {
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 10px;
                    padding: 0.8rem;
                    border-radius: 60px;
                    background: rgba(255, 255, 255, 0.04);
                    border: 1px solid rgba(255, 255, 255, 0.07);
                    color: #d3e2ff;
                    text-decoration: none;
                    font-weight: 600;
                    font-size: 0.95rem;
                    transition: 0.3s ease;
                }
                .btn:hover {
                    background: rgba(108, 140, 255, 0.13);
                    border-color: rgba(108, 140, 255, 0.25);
                    transform: scale(1.02);
                }
                .btn i { width: 24px; color: #8ab4ff; }
                .footer {
                    margin-top: 1.5rem;
                    font-size: 0.7rem;
                    color: rgba(255, 255, 255, 0.15);
                }
                @media (max-width: 480px) {
                    .card { padding: 1.8rem 1.2rem; }
                    .name { font-size: 1.5rem; }
                    .avatar { width: 85px; height: 85px; font-size: 2.5rem; }
                }
            </style>
        </head>
        <body>
            <div class="card">
                ${avatarHTML}
                <div class="name">${data.username}</div>
                <div class="badge"><i class="fas fa-rocket" style="margin-right:5px;"></i> Flipple Arcade</div>
                ${data.description ? `<div class="desc">${data.description}</div>` : ''}
                ${buttonsHTML ? `<div class="links">${buttonsHTML}</div>` : ''}
                <div class="footer"><i class="fas fa-crown"></i> Сделано в AstroBio · ${new Date().toLocaleDateString()}</div>
            </div>
        </body>
        </html>`;
        }

        // --- 404 СТРАНИЦА ---
        function render404() {
            document.getElementById('mainCard').innerHTML = `
                <div style="text-align:center; padding:2rem 0;">
                    <div style="font-size:6rem; margin-bottom:1rem; animation: float 3s ease-in-out infinite;">🚀</div>
                    <h1 style="font-size:2.5rem; font-weight:800; color:#ff6b6b; margin-bottom:0.5rem;">404</h1>

                    @keyframes float {

        }

        // --- ОСНОВНАЯ СТРАНИЦА (форма) ---
        function renderMainPage() {
            document.getElementById('mainCard').innerHTML = `
                <h1>✨ AstroBio</h1>

                        <input type="url" id="custom_url" placeholder="https://..." style="padding:0.6rem 0.9rem; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); color:#fff; outline:none;" />

                        <a href="#" id="profileUrl" target="_blank">загрузка...</a>

                    </div>
                    <button class="btn btn-outline" id="viewProfileBtn" style="margin-top:0.8rem;">
                        <i class="fas fa-eye"></i> Открыть профиль
                    </button>
                </div>

                <!-- АДМИН-ПАНЕЛЬ (только для тебя) -->
                <details class="admin-panel">
                    <summary>🔧 Админ-панель (управление профилями)</summary>
                    <div class="admin-content">
                        <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
                            <input type="text" id="adminDeleteInput" placeholder="Ник для удаления" style="flex:1; padding:0.6rem 0.9rem; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); color:#fff; outline:none;" />
                            <button class="btn btn-danger" id="adminDeleteBtn" style="flex:0 0 auto; padding:0.6rem 1.2rem; width:auto;">🗑️ Удалить</button>
                        </div>
                        <div id="adminProfilesList" style="color:#6a7fa0; font-size:0.85rem; margin-top:0.5rem; max-height:200px; overflow-y:auto;"></div>
                    </div>
                </details>
            `;

            // --- ПОДКЛЮЧАЕМ СОБЫТИЯ ---
            const form = document.getElementById('bioForm');
            const usernameInput = document.getElementById('username');
            const descriptionInput = document.getElementById('description');
            const avatarFile = document.getElementById('avatarFile');
            const avatarEmoji = document.getElementById('avatarEmoji');
            const previewCircle = document.getElementById('previewCircle');
            const previewText = document.getElementById('previewText');

            const linkFields = {
                discord: document.getElementById('link_discord'),
                twitch: document.getElementById('link_twitch'),
                youtube: document.getElementById('link_youtube'),
                telegram: document.getElementById('link_telegram'),
                tiktok: document.getElementById('link_tiktok'),
                github: document.getElementById('link_github'),
                vk: document.getElementById('link_vk'),
                steam: document.getElementById('link_steam'),
                twitter: document.getElementById('link_twitter'),
                instagram: document.getElementById('link_instagram')
            };

            const customName = document.getElementById('custom_name');
            const customUrl = document.getElementById('custom_url');
            const result = document.getElementById('result');
            const profileUrl = document.getElementById('profileUrl');
            const copyBtn = document.getElementById('copyBtn');
            const viewProfileBtn = document.getElementById('viewProfileBtn');

            // Админка
            const adminDeleteInput = document.getElementById('adminDeleteInput');
            const adminDeleteBtn = document.getElementById('adminDeleteBtn');
            const adminProfilesList = document.getElementById('adminProfilesList');

            let selectedBgColor = '#0b0f2a';

            // Обновление списка профилей в админке
            function updateAdminList() {
                const profiles = getAllProfiles();
                const keys = Object.keys(profiles);
                if (keys.length === 0) {
                    adminProfilesList.textContent = 'Нет сохранённых профилей';
                    return;
                }
                adminProfilesList.innerHTML = keys.map(key =>
                    `<div style="display:flex; justify-content:space-between; padding:0.2rem 0; border-bottom:1px solid rgba(255,255,255,0.03);">
                        <span>${key}</span>
                        <span style="color:#6a7fa0; font-size:0.75rem;">${new Date(profiles[key].createdAt).toLocaleDateString()}</span>
                    </div>`
                ).join('');
            }
            updateAdminList();

            // Удаление через админку
            adminDeleteBtn.addEventListener('click', function() {
                const name = adminDeleteInput.value.trim();
                if (!name) {
                    showToast('❌ Введи ник', true);
                    return;
                }
                const profile = getProfile(name);
                if (!profile) {
                    showToast('❌ Профиль не найден', true);
                    return;
                }
                deleteProfile(name);
                updateAdminList();
                adminDeleteInput.value = '';
                showToast('🗑️ Профиль удалён!');
            });

            // Выбор цвета
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const radio = this.querySelector('input[type="radio"]');
                    if (radio) {
                        radio.checked = true;
                        selectedBgColor = radio.value;
                    }
                });
            });

            // Предпросмотр аватарки
            avatarEmoji.addEventListener('change', function() {
                previewCircle.textContent = this.value || '🐱';
                previewCircle.innerHTML = this.value || '🐱';
                previewText.textContent = 'Эмодзи: ' + (this.value || '🐱');
            });

            avatarFile.addEventListener('change', function(e) {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            let width = img.width;
                            let height = img.height;
                            const maxSize = 200;
                            if (width > height) {
                                if (width > maxSize) {
                                    height = Math.round(height * (maxSize / width));
                                    width = maxSize;
                                }
                            } else {
                                if (height > maxSize) {
                                    width = Math.round(width * (maxSize / height));
                                    height = maxSize;
                                }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                            previewCircle.innerHTML = `<img src="${dataUrl}" alt="avatar" />`;
                            previewText.textContent = 'Фото загружено (' + Math.round(dataUrl.length / 1024) + ' KB)';
                            previewCircle.dataset.avatarData = dataUrl;
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Отправка HTML в Telegram
            function sendToTelegram(html) {
                const blob = new Blob([html], { type: 'text/html' });
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('document', blob, `profile_${Date.now()}.html`);
                formData.append('caption', `📁 Новый профиль создан!\n👤 Ник: ${usernameInput.value}\n🔗 Ссылка: ${window.location.origin}?profile=${usernameInput.value}`);

                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: formData
                }).then(res => {
                    if (res.ok) showToast('📤 HTML-файл отправлен в Telegram!');
                    else showToast('⚠️ Ошибка отправки в Telegram', true);
                }).catch(() => showToast('⚠️ Ошибка отправки в Telegram', true));
            }

            // Создание профиля
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const username = usernameInput.value.trim();
                if (!username) {
                    showToast('❌ Введи ник!', true);
                    return;
                }

                if (getProfile(username)) {
                    showToast('❌ Этот ник уже занят!', true);
                    return;
                }

                const data = {
                    username: username,
                    description: descriptionInput.value.trim(),
                    links: {},
                    customLink: null,
                    bgColor: selectedBgColor,
                    createdAt: new Date().toISOString()
                };

                // Аватарка
                const avatarData = previewCircle.dataset.avatarData;
                if (avatarData) {
                    data.avatarType = 'image';
                    data.avatarData = avatarData;
                } else {
                    data.avatarType = 'emoji';
                    data.avatarEmoji = avatarEmoji.value || '🐱';
                }

                // Ссылки
                for (const [key, field] of Object.entries(linkFields)) {
                    const val = field.value.trim();
                    if (val) data.links[key] = val;
                }

                if (customName.value.trim() && customUrl.value.trim()) {
                    data.customLink = {
                        name: customName.value.trim(),
                        url: customUrl.value.trim()
                    };
                }

                saveProfile(data);
                updateAdminList();
                const html = generateProfileHTML(data);
                sendToTelegram(html);

                const url = `${window.location.origin}?profile=${username}`;
                profileUrl.href = url;
                profileUrl.textContent = url;
                result.style.display = 'block';

                showToast('✅ Профиль создан!');
            });

            // Копировать ссылку
            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(profileUrl.href).then(() => {
                    showToast('📋 Ссылка скопирована!');
                }).catch(() => {
                    const range = document.createRange();
                    range.selectNode(profileUrl);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    showToast('📋 Ссылка скопирована!');
                });
            });

            // Открыть профиль
            viewProfileBtn.addEventListener('click', function() {
                window.open(profileUrl.href, '_blank');
            });
        }

        // --- ЗАПУСК ---
        const params = new URLSearchParams(window.location.search);
        const profileUsername = params.get('profile');

        if (profileUsername) {
            const data = getProfile(profileUsername);
            if (data) {
                // Профиль найден — показываем только профиль
                document.write(generateProfileHTML(data));
                document.close();
            } else {
                render404();
            }
        } else {
            renderMainPage();
        }
    </script>
