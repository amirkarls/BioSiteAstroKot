<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroBio · Создай своё космическое био</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0a1a, #050510);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            color: #fff;
            position: relative;
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star-dot {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 820px;
            width: 100%;
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        /* ---- КАРТОЧКА ФОРМЫ ---- */
        .form-card {
            background: rgba(18, 25, 55, 0.25);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 32px;
            padding: 2rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-card::-webkit-scrollbar { width: 4px; }
        .form-card::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .form-card::-webkit-scrollbar-thumb { background: rgba(108,140,255,0.2); border-radius: 10px; }

        .form-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f9ff, #b6d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.2rem;
        }
        .form-card .sub {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            margin-bottom: 1.2rem;
        }

        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.3rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: rgba(108,140,255,0.25);
            background: rgba(255,255,255,0.07);
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,255,255,0.15); }
        .form-group select option { background: #1a1a2e; color: #fff; }

        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

        .color-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 0.2rem;
        }
        .color-options .color-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .color-options .color-btn:hover { transform: scale(1.1); }
        .color-options .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .color-options .color-btn.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 0.9rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.9);
        }
        .color-options .color-btn input[type="radio"] { display: none; }

        .bg-upload-wrapper {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .bg-upload-wrapper .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            flex: 1;
        }
        .bg-upload-wrapper .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .bg-upload-wrapper .file-input-wrapper .fake-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0.6rem 1rem;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .bg-upload-wrapper .file-input-wrapper .fake-btn:hover {
            background: rgba(255,255,255,0.08);
        }
        .bg-preview {
            padding: 0.3rem 0.8rem;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.03);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .link-block {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: center;
        }
        .link-block .platform-icon {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .link-block .platform-icon i { width: 18px; color: #a855f7; font-size: 0.9rem; }
        .link-block input {
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            color: #fff;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }
        .link-block input:focus {
            border-color: rgba(108,140,255,0.2);
            background: rgba(255,255,255,0.06);
        }
        .link-block input::placeholder { color: rgba(255,255,255,0.12); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            width: 100%;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #4f7aff, #8b5cf6);
            box-shadow: 0 4px 25px rgba(79,122,255,0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(79,122,255,0.35);
        }
        .btn-outline {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
        }
        .btn-outline:hover { background: rgba(255,255,255,0.07); }

        /* ---- ПРЕДПРОСМОТР ---- */
        .preview-card {
            background: rgba(18, 25, 55, 0.15);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border-radius: 32px;
            padding: 2rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            position: relative;
            overflow: hidden;
        }
        .preview-card .preview-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            transition: all 0.5s ease;
        }
        .preview-card .preview-content {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
        }
        .preview-card .preview-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c8cff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 0.8rem;
            box-shadow: 0 8px 30px rgba(108,140,255,0.15);
            border: 2px solid rgba(255,255,255,0.06);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .preview-card .preview-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .preview-card .preview-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            transition: color 0.3s ease;
        }
        .preview-card .preview-role {
            font-size: 0.65rem;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 0.2rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.04);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            display: inline-block;
        }
        .preview-card .preview-desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin: 0.8rem 0 1rem 0;
            padding: 0.6rem 1rem;
            background: rgba(0,10,30,0.15);
            border-radius: 12px;
            border-left: 2px solid rgba(108,140,255,0.15);
            min-height: 40px;
            transition: all 0.3s ease;
        }
        .preview-card .preview-links {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            width: 100%;
        }
        .preview-card .preview-links .plink {
            padding: 0.5rem;
            border-radius: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .preview-card .preview-links .plink i { color: rgba(255,255,255,0.2); width: 16px; }
        .preview-card .preview-status {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            margin-top: 0.5rem;
        }
        .preview-card .preview-empty {
            color: rgba(255,255,255,0.15);
            font-size: 0.9rem;
            text-align: center;
        }
        .preview-card .preview-empty i { font-size: 2rem; display: block; margin-bottom: 0.5rem; opacity: 0.3; }

        .preview-label {
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.1);
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 2;
        }

        /* ---- TOAST ---- */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(16,185,129,0.9);
            backdrop-filter: blur(16px);
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            color: #fff;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 100;
            max-width: 90%;
            text-align: center;
            font-size: 0.9rem;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(239,68,68,0.9); }

        /* ---- РЕЗУЛЬТАТ ПОСЛЕ СОЗДАНИЯ ---- */
        .result-box {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.04);
            display: none;
        }
        .result-box.show { display: block; }
        .result-box .link-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.8rem;
        }
        .result-box .link-row a { color: #6c8cff; word-break: break-all; }
        .result-box .link-row .copy-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: rgba(255,255,255,0.4);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }
        .result-box .link-row .copy-btn:hover { background: rgba(255,255,255,0.08); }

        @media (max-width: 720px) {
            .container { grid-template-columns: 1fr; gap: 1rem; }
            .preview-card { min-height: 200px; }
            .row2 { grid-template-columns: 1fr; }
            .form-card { max-height: none; }
        }
        @media (max-width: 480px) {
            .form-card { padding: 1.2rem 1rem; border-radius: 24px; }
            .preview-card { padding: 1.2rem 1rem; border-radius: 24px; min-height: 160px; }
            .preview-card .preview-avatar { width: 60px; height: 60px; font-size: 1.8rem; }
            .preview-card .preview-name { font-size: 1.2rem; }
            .link-block { grid-template-columns: 1fr; gap: 0.3rem; }
        }
    </style>
</head>
<body>

    <!-- ЗВЁЗДЫ -->
    <div class="stars-bg" id="starsBg"></div>

    <div class="container">
        <!-- ФОРМА -->
        <div class="form-card">
            <h2>✨ Создай своё космическое био</h2>
            <div class="sub">Заполни поля и смотри предпросмотр справа</div>
            <form id="bioForm">
                <div class="form-group">
                    <label>📛 Ник *</label>
                    <input type="text" id="username" placeholder="Например: AstroKot" required />
                </div>
                <div class="row2">
                    <div class="form-group">
                        <label>🖼️ Аватар</label>
                        <div class="file-input-wrapper" style="position:relative;overflow:hidden;display:inline-block;width:100%;">
                            <div class="fake-btn" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:0.6rem;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);font-size:0.8rem;cursor:pointer;">
                                <i class="fas fa-upload"></i> Загрузить
                            </div>
                            <input type="file" id="avatarFile" accept="image/*" style="position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer;" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>😊 Эмодзи</label>
                        <select id="avatarEmoji" style="width:100%;padding:0.6rem 1rem;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#fff;font-size:1rem;outline:none;">
                            <option value="🐱">🐱 Кот</option>
                            <option value="🚀">🚀 Ракета</option>
                            <option value="⭐">⭐ Звезда</option>
                            <option value="🌙">🌙 Луна</option>
                            <option value="🪐">🪐 Сатурн</option>
                            <option value="👾">👾 Инопланетянин</option>
                            <option value="🤖">🤖 Робот</option>
                            <option value="🎮">🎮 Геймер</option>
                            <option value="🔥">🔥 Огонь</option>
                            <option value="💎">💎 Алмаз</option>
                            <option value="🌈">🌈 Радуга</option>
                            <option value="🌌">🌌 Галактика</option>
                            <option value="🐉">🐉 Дракон</option>
                            <option value="🦊">🦊 Лиса</option>
                            <option value="🐺">🐺 Волк</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>📝 Описание</label>
                    <textarea id="description" placeholder="Расскажи о себе..." rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>🏷️ Роль / статус</label>
                    <input type="text" id="userRole" placeholder="Например: Стример, Кодер, Игрок..." value="Flipple Arcade" />
                </div>

                <div class="form-group">
                    <label>🌌 Фон</label>
                    <div class="bg-upload-wrapper">
                        <div class="file-input-wrapper" style="flex:2;">
                            <div class="fake-btn"><i class="fas fa-image"></i> Загрузить картинку</div>
                            <input type="file" id="bgFile" accept="image/*" />
                        </div>
                        <span class="bg-preview" id="bgPreview">Нет</span>
                    </div>
                </div>

                <div class="form-group" style="margin-top:0.5rem;">
                    <label>🎨 Или выбери цвет</label>
                    <div class="color-options" id="colorOptions">
                        <label class="color-btn active" style="background:#0b0f2a;"><input type="radio" name="bgColor" value="#0b0f2a" checked /></label>
                        <label class="color-btn" style="background:#1a0a2e;"><input type="radio" name="bgColor" value="#1a0a2e" /></label>
                        <label class="color-btn" style="background:#0a1a2e;"><input type="radio" name="bgColor" value="#0a1a2e" /></label>
                        <label class="color-btn" style="background:#2e0a1a;"><input type="radio" name="bgColor" value="#2e0a1a" /></label>
                        <label class="color-btn" style="background:#1a2e0a;"><input type="radio" name="bgColor" value="#1a2e0a" /></label>
                        <label class="color-btn" style="background:#2e1a0a;"><input type="radio" name="bgColor" value="#2e1a0a" /></label>
                        <label class="color-btn" style="background:#0a0a2e;"><input type="radio" name="bgColor" value="#0a0a2e" /></label>
                        <label class="color-btn" style="background:#1a0a0a;"><input type="radio" name="bgColor" value="#1a0a0a" /></label>
                        <label class="color-btn" style="background:#0a1a1a;"><input type="radio" name="bgColor" value="#0a1a1a" /></label>
                    </div>
                </div>

                <div class="form-group">
                    <label>🎨 Цвет текста</label>
                    <select id="textColor">
                        <option value="#ffffff">⬜ Белый</option>
                        <option value="#f0f9ff">💠 Голубой</option>
                        <option value="#fbbf24">⭐ Золотой</option>
                        <option value="#34d399">🌿 Изумрудный</option>
                        <option value="#f472b6">🌸 Розовый</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🔵 Статус</label>
                    <select id="status">
                        <option value="">Без статуса</option>
                        <option value="online">🟢 В сети</option>
                        <option value="offline">⚫ Офлайн</option>
                        <option value="gaming">🎮 В игре</option>
                        <option value="dnd">🔴 Не беспокоить</option>
                    </select>
                </div>

                <div style="margin-top:1rem; border-top:1px solid rgba(255,255,255,0.04); padding-top:1rem;">
                    <div style="font-size:0.75rem; font-weight:600; color:rgba(255,255,255,0.3); margin-bottom:0.5rem;">🔗 Ссылки (заполни нужные)</div>
                    <div class="link-block"><span class="platform-icon"><i class="fab fa-discord"></i> Discord</span><input type="url" id="link_discord" placeholder="https://discord.gg/..." /></div>
                    <div class="link-block"><span class="platform-icon"><i class="fab fa-twitch"></i> Twitch</span><input type="url" id="link_twitch" placeholder="https://twitch.tv/..." /></div>
                    <div class="link-block"><span class="platform-icon"><i class="fab fa-youtube"></i> YouTube</span><input type="url" id="link_youtube" placeholder="https://youtube.com/..." /></div>
                    <div class="link-block"><span class="platform-icon"><i class="fab fa-telegram"></i> Telegram</span><input type="url" id="link_telegram" placeholder="https://t.me/..." /></div>
                    <div class="link-block"><span class="platform-icon"><i class="fab fa-github"></i> GitHub</span><input type="url" id="link_github" placeholder="https://github.com/..." /></div>
                    <div class="link-block"><span class="platform-icon"><i class="fab fa-vk"></i> VK</span><input type="url" id="link_vk" placeholder="https://vk.com/..." /></div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-top:0.5rem;">
                    <input type="text" id="custom_name" placeholder="Своя ссылка" style="padding:0.5rem 0.8rem; border-radius:10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); color:#fff; outline:none; font-size:0.8rem;" />
                    <input type="url" id="custom_url" placeholder="https://..." style="padding:0.5rem 0.8rem; border-radius:10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); color:#fff; outline:none; font-size:0.8rem;" />
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top:1rem;">
                    <i class="fas fa-rocket"></i> Создать био
                </button>
            </form>

            <div class="result-box" id="resultBox">
                <div style="text-align:center; font-weight:700; color:#34d399; margin-bottom:0.5rem;">✅ Био создано!</div>
                <div class="link-row">
                    <span style="color:rgba(255,255,255,0.3);">🔗 Ссылка:</span>
                    <a href="#" id="profileUrl" target="_blank">загрузка...</a>
                    <button class="copy-btn" id="copyBtn">📋 Копировать</button>
                </div>
                <button class="btn btn-outline" id="viewProfileBtn" style="margin-top:0.6rem; padding:0.5rem;">
                    <i class="fas fa-eye"></i> Открыть био
                </button>
            </div>
        </div>

        <!-- ПРЕДПРОСМОТР -->
        <div class="preview-card" id="previewCard">
            <span class="preview-label">👁️ предпросмотр</span>
            <div class="preview-bg" id="previewBg" style="background:#0b0f2a;"></div>
            <div class="preview-content">
                <div class="preview-avatar" id="previewAvatar">🐱</div>
                <div class="preview-name" id="previewName">Твой ник</div>
                <div class="preview-role" id="previewRole">Flipple Arcade</div>
                <div class="preview-desc" id="previewDesc">Твоё описание появится здесь</div>
                <div class="preview-links" id="previewLinks">
                    <div class="plink"><i class="fas fa-link"></i> Твои ссылки</div>
                </div>
                <div class="preview-status" id="previewStatus"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ---- ЗВЁЗДЫ ----
        (function() {
            const c = document.getElementById('starsBg');
            for (let i = 0; i < 100; i++) {
                const s = document.createElement('div');
                s.className = 'star-dot';
                const size = Math.random() * 2 + 0.5;
                s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*4+2}s;animation-delay:${Math.random()*5}s;opacity:${Math.random()*0.5+0.1};`;
                c.appendChild(s);
            }
        })();

        // ---- TOAST ----
        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.className = 'toast' + (isError ? ' error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ---- LOCALSTORAGE ----
        function getProfile(username) {
            const p = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            return p[username.toLowerCase()] || null;
        }
        function saveProfile(data) {
            const p = JSON.parse(localStorage.getItem('astroBioProfiles') || '{}');
            p[data.username.toLowerCase()] = data;
            localStorage.setItem('astroBioProfiles', JSON.stringify(p));
        }

        // ---- ГЕНЕРАЦИЯ HTML-БИО ----
        function generateBioHTML(data) {
            const links = data.links || {};
            const customLink = data.customLink;
            const linkIcons = {
                discord: 'fab fa-discord', twitch: 'fab fa-twitch', youtube: 'fab fa-youtube',
                telegram: 'fab fa-telegram', github: 'fab fa-github', vk: 'fab fa-vk'
            };
            const linkLabels = {
                discord: 'Discord', twitch: 'Twitch', youtube: 'YouTube',
                telegram: 'Telegram', github: 'GitHub', vk: 'VK'
            };
            let buttonsHTML = '';
            for (const [key, val] of Object.entries(links)) {
                if (val && val.trim()) {
                    buttonsHTML += `<a href="${val}" target="_blank" class="btn" style="margin-bottom:0.5rem;display:flex;align-items:center;justify-content:center;gap:8px;padding:0.6rem;border-radius:40px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.85rem;transition:0.3s;"><i class="${linkIcons[key]||'fas fa-link'}" style="width:18px;color:rgba(255,255,255,0.3);"></i> ${linkLabels[key]||key}</a>`;
                }
            }
            if (customLink && customLink.name && customLink.url) {
                buttonsHTML += `<a href="${customLink.url}" target="_blank" class="btn" style="margin-bottom:0.5rem;display:flex;align-items:center;justify-content:center;gap:8px;padding:0.6rem;border-radius:40px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.85rem;transition:0.3s;"><i class="fas fa-link" style="width:18px;color:rgba(255,255,255,0.3);"></i> ${customLink.name}</a>`;
            }

            let avatarHTML = '';
            if (data.avatarType === 'emoji') avatarHTML = `<div class="avatar" style="font-size:3rem;">${data.avatarEmoji||'🐱'}</div>`;
            else if (data.avatarType === 'image' && data.avatarData) avatarHTML = `<div class="avatar"><img src="${data.avatarData}" style="width:100%;height:100%;object-fit:cover;" /></div>`;
            else avatarHTML = `<div class="avatar" style="font-size:3rem;">🐱</div>`;

            const statusColors = { 'online':'#34d399', 'offline':'#6a7fa0', 'gaming':'#fbbf24', 'dnd':'#ef4444' };
            const statusLabels = { 'online':'🟢 В сети', 'offline':'⚫ Офлайн', 'gaming':'🎮 В игре', 'dnd':'🔴 Не беспокоить' };
            const statusText = data.status ? statusLabels[data.status]||'' : '';
            const statusColor = data.status ? statusColors[data.status]||'#6a7fa0' : '#6a7fa0';
            const textColor = data.textColor || '#ffffff';
            const role = data.role || 'Flipple Arcade';

            let bgGradient = '';
            if (data.bgImage) bgGradient = `url(${data.bgImage}) center/cover no-repeat`;
            else if (data.bgStyle === 'galaxy') bgGradient = 'radial-gradient(circle at 30% 20%, #1a0a2e, #0b0f2a)';
            else if (data.bgStyle === 'sunset') bgGradient = 'radial-gradient(circle at 30% 20%, #2e0a1a, #1a0a0a)';
            else if (data.bgStyle === 'ocean') bgGradient = 'radial-gradient(circle at 30% 20%, #0a1a2e, #0a0a1a)';
            else if (data.bgStyle === 'forest') bgGradient = 'radial-gradient(circle at 30% 20%, #0a2e1a, #0a1a0a)';
            else bgGradient = data.bgColor || '#0b0f2a';

            return `<!DOCTYPE html>
        <html lang="ru"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>${data.username} · AstroBio</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
        <style>
            * { margin:0; padding:0; box-sizing:border-box; }
            body { background:${bgGradient}; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Inter',sans-serif; padding:1.5rem; color:#fff; }
            .card { max-width:420px; width:100%; background:rgba(18,25,55,0.2); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.04); border-radius:40px; padding:2rem 1.8rem; box-shadow:0 30px 80px rgba(0,0,0,0.4); text-align:center; }
            .avatar { width:90px; height:90px; margin:0 auto 0.8rem; background:linear-gradient(135deg,#6c8cff,#a855f7); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 30px rgba(108,140,255,0.15); border:2px solid rgba(255,255,255,0.06); overflow:hidden; }
            .name { font-size:1.6rem; font-weight:800; color:${textColor}; }
            .role { font-size:0.6rem; font-weight:600; color:rgba(255,255,255,0.3); letter-spacing:0.5px; text-transform:uppercase; margin-top:0.2rem; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.04); padding:0.2rem 1rem; border-radius:40px; display:inline-block; }
            .desc { color:${textColor}; font-size:0.85rem; line-height:1.6; margin:0.8rem 0 1.2rem; padding:0.6rem 1rem; background:rgba(0,10,30,0.15); border-radius:12px; border-left:2px solid rgba(108,140,255,0.15); opacity:0.8; }
            .links { display:flex; flex-direction:column; gap:0.4rem; }
            .btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:0.6rem; border-radius:40px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); color:rgba(255,255,255,0.5); text-decoration:none; font-size:0.8rem; transition:0.3s; }
            .btn:hover { background:rgba(255,255,255,0.06); color:#fff; }
            .btn i { width:18px; color:rgba(255,255,255,0.2); }
            .status { font-size:0.7rem; color:${statusColor}; margin-top:0.8rem; }
            .footer { font-size:0.6rem; color:rgba(255,255,255,0.1); margin-top:1rem; }
            @media (max-width:480px) { .card { padding:1.5rem 1.2rem; } .name { font-size:1.3rem; } .avatar { width:70px; height:70px; font-size:2rem; } }
        </style>
        </head><body>
            <div class="card">
                ${avatarHTML}
                <div class="name">${data.username}</div>
                <div class="role">${role}</div>
                ${data.description ? `<div class="desc">${data.description}</div>` : ''}
                ${buttonsHTML ? `<div class="links">${buttonsHTML}</div>` : ''}
                ${statusText ? `<div class="status">${statusText}</div>` : ''}
                <div class="footer">✨ Сделано в AstroBio</div>
            </div>
        </body></html>`;
        }

        // ---- ПРЕДПРОСМОТР (обновляется в реальном времени) ----
        function updatePreview() {
            const name = document.getElementById('username').value || 'Твой ник';
            const desc = document.getElementById('description').value || 'Твоё описание появится здесь';
            const role = document.getElementById('userRole').value || 'Flipple Arcade';
            const status = document.getElementById('status').value;
            const textColor = document.getElementById('textColor').value;
            const emoji = document.getElementById('avatarEmoji').value;
            const avatarData = document.getElementById('previewAvatar').dataset.avatarData;

            document.getElementById('previewName').textContent = name;
            document.getElementById('previewDesc').textContent = desc;
            document.getElementById('previewRole').textContent = role;
            document.getElementById('previewName').style.color = textColor;
            document.getElementById('previewDesc').style.color = textColor;

            // Аватар
            const av = document.getElementById('previewAvatar');
            if (avatarData) {
                av.innerHTML = `<img src="${avatarData}" style="width:100%;height:100%;object-fit:cover;" />`;
            } else {
                av.innerHTML = emoji || '🐱';
                av.style.fontSize = '2.5rem';
            }

            // Статус
            const st = document.getElementById('previewStatus');
            const statusLabels = { 'online':'🟢 В сети', 'offline':'⚫ Офлайн', 'gaming':'🎮 В игре', 'dnd':'🔴 Не беспокоить' };
            st.textContent = status ? statusLabels[status] || '' : '';

            // Ссылки
            const container = document.getElementById('previewLinks');
            const links = {
                discord: document.getElementById('link_discord').value,
                twitch: document.getElementById('link_twitch').value,
                youtube: document.getElementById('link_youtube').value,
                telegram: document.getElementById('link_telegram').value,
                github: document.getElementById('link_github').value,
                vk: document.getElementById('link_vk').value
            };
            const icons = { discord:'fab fa-discord', twitch:'fab fa-twitch', youtube:'fab fa-youtube', telegram:'fab fa-telegram', github:'fab fa-github', vk:'fab fa-vk' };
            const labels = { discord:'Discord', twitch:'Twitch', youtube:'YouTube', telegram:'Telegram', github:'GitHub', vk:'VK' };
            let html = '';
            let hasLinks = false;
            for (const [key, val] of Object.entries(links)) {
                if (val && val.trim()) {
                    hasLinks = true;
                    html += `<div class="plink"><i class="${icons[key]||'fas fa-link'}"></i> ${labels[key]||key}</div>`;
                }
            }
            const cname = document.getElementById('custom_name').value;
            const curl = document.getElementById('custom_url').value;
            if (cname && curl) {
                hasLinks = true;
                html += `<div class="plink"><i class="fas fa-link"></i> ${cname}</div>`;
            }
            container.innerHTML = hasLinks ? html : '<div class="plink"><i class="fas fa-link"></i> Твои ссылки</div>';

            // Фон
            const bg = document.getElementById('previewBg');
            const bgColor = document.querySelector('input[name="bgColor"]:checked');
            const bgStyle = document.getElementById('bgStyle') ? document.getElementById('bgStyle').value : 'default';
            const bgImage = document.getElementById('previewBg').dataset.bgImage || null;

            if (bgImage) {
                bg.style.background = `url(${bgImage}) center/cover no-repeat`;
            } else if (bgColor) {
                let grad = bgColor.value;
                if (bgStyle === 'galaxy') grad = 'radial-gradient(circle at 30% 20%, #1a0a2e, #0b0f2a)';
                else if (bgStyle === 'sunset') grad = 'radial-gradient(circle at 30% 20%, #2e0a1a, #1a0a0a)';
                else if (bgStyle === 'ocean') grad = 'radial-gradient(circle at 30% 20%, #0a1a2e, #0a0a1a)';
                else if (bgStyle === 'forest') grad = 'radial-gradient(circle at 30% 20%, #0a2e1a, #0a1a0a)';
                bg.style.background = grad;
            }
        }

        // ---- ПОДПИСКА НА ИЗМЕНЕНИЯ ----
        document.addEventListener('DOMContentLoaded', function() {
            const fields = ['username', 'description', 'userRole', 'status', 'textColor', 'avatarEmoji',
                'link_discord', 'link_twitch', 'link_youtube', 'link_telegram', 'link_github', 'link_vk',
                'custom_name', 'custom_url'
            ];
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', updatePreview);
            });
            document.getElementById('avatarFile').addEventListener('change', function(e) {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            let w = img.width,
                                h = img.height;
                            const max = 200;
                            if (w > h) { if (w > max) { h = Math.round(h * (max / w));
                                    w = max; } } else { if (h > max) { w = Math.round(w * (max / h));
                                    h = max; } }
                            canvas.width = w;
                            canvas.height = h;
                            ctx.drawImage(img, 0, 0, w, h);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                            const av = document.getElementById('previewAvatar');
                            av.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;" />`;
                            av.dataset.avatarData = dataUrl;
                            document.getElementById('previewAvatar').dataset.avatarData = dataUrl;
                            updatePreview();
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('bgFile').addEventListener('change', function(e) {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const bg = document.getElementById('previewBg');
                        bg.style.background = `url(${ev.target.result}) center/cover no-repeat`;
                        bg.dataset.bgImage = ev.target.result;
                        document.getElementById('bgPreview').textContent = '✅ Фон загружен';
                        document.getElementById('bgPreview').style.color = '#34d399';
                    };
                    reader.readAsDataURL(file);
                }
            });

            document.querySelectorAll('.color-btn input[type="radio"]').forEach(el => {
                el.addEventListener('change', function() {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    this.closest('.color-btn').classList.add('active');
                    // Сбрасываем картинку фона
                    document.getElementById('previewBg').dataset.bgImage = null;
                    document.getElementById('bgPreview').textContent = 'Нет';
                    document.getElementById('bgPreview').style.color = 'rgba(255,255,255,0.25)';
                    updatePreview();
                });
            });

            // Стиль фона
            const bgStyle = document.getElementById('bgStyle');
            if (bgStyle) bgStyle.addEventListener('change', updatePreview);

            // Цвет текста
            document.getElementById('textColor').addEventListener('change', updatePreview);

            updatePreview();
        });

        // ---- ОТПРАВКА В TELEGRAM ----
        function sendToTelegram(html, username) {
            const blob = new Blob([html], { type: 'text/html' });
            const fd = new FormData();
            fd.append('chat_id', '5577770421');
            fd.append('document', blob, `bio_${Date.now()}.html`);
            fd.append('caption', `📁 Новое био!\n👤 Ник: ${username}\n🔗 Ссылка: ${window.location.origin}?profile=${username}`);
            fetch('https://api.telegram.org/bot8961365984:AAFmWGgNf8IjhHxKBmUxNl3cuYX6cYOHl0Q/sendDocument', {
                method: 'POST',
                body: fd
            }).then(() => {}).catch(() => {});
        }

        // ---- СОЗДАНИЕ БИО ----
        document.getElementById('bioForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            if (!username) { showToast('❌ Введи ник!', true); return; }
            if (getProfile(username)) { showToast('❌ Этот ник уже занят!', true); return; }

            const data = {
                username: username,
                description: document.getElementById('description').value.trim(),
                role: document.getElementById('userRole').value.trim() || 'Flipple Arcade',
                links: {},
                customLink: null,
                bgColor: document.querySelector('input[name="bgColor"]:checked')?.value || '#0b0f2a',
                bgStyle: document.getElementById('bgStyle')?.value || 'default',
                bgImage: document.getElementById('previewBg').dataset.bgImage || null,
                textColor: document.getElementById('textColor').value,
                status: document.getElementById('status').value,
                views: 0,
                createdAt: new Date().toISOString()
            };

            const av = document.getElementById('previewAvatar');
            if (av.dataset.avatarData) {
                data.avatarType = 'image';
                data.avatarData = av.dataset.avatarData;
            } else {
                data.avatarType = 'emoji';
                data.avatarEmoji = document.getElementById('avatarEmoji').value || '🐱';
            }

            const linkFields = ['discord', 'twitch', 'youtube', 'telegram', 'github', 'vk'];
            linkFields.forEach(key => {
                const val = document.getElementById(`link_${key}`).value.trim();
                if (val) data.links[key] = val;
            });
            const cname = document.getElementById('custom_name').value.trim();
            const curl = document.getElementById('custom_url').value.trim();
            if (cname && curl) data.customLink = { name: cname, url: curl };

            saveProfile(data);
            const html = generateBioHTML(data);
            sendToTelegram(html, username);

            const url = `${window.location.origin}?profile=${username}`;
            document.getElementById('profileUrl').href = url;
            document.getElementById('profileUrl').textContent = url;
            document.getElementById('resultBox').classList.add('show');
            showToast('✅ Био создано!');
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            const url = document.getElementById('profileUrl').textContent;
            navigator.clipboard.writeText(url).then(() => showToast('📋 Ссылка скопирована!'));
        });
        document.getElementById('viewProfileBtn').addEventListener('click', function() {
            window.open(document.getElementById('profileUrl').href, '_blank');
        });

        // ---- ЗАГРУЗКА ПРОФИЛЯ ИЗ URL ----
        const params = new URLSearchParams(window.location.search);
        const pname = params.get('profile');
        if (pname) {
            const data = getProfile(pname);
            if (data) {
                data.views = (data.views || 0) + 1;
                saveProfile(data);
                document.write(generateBioHTML(data));
                document.close();
            } else {
                document.getElementById('mainCard')?.replaceWith?.(document.createElement('div')) || null;
                document.body.innerHTML = `
                    <div style="text-align:center;padding:2rem;">
                        <div style="font-size:4rem;margin-bottom:1rem;">🚀</div>
                        <h1 style="font-size:2rem;color:#ff6b6b;">404</h1>
                        <p style="color:rgba(255,255,255,0.5);">Био не найдено</p>
                        <a href="/" style="display:inline-block;margin-top:1rem;padding:0.6rem 1.5rem;border-radius:40px;background:linear-gradient(135deg,#4f7aff,#8b5cf6);color:#fff;text-decoration:none;">Вернуться</a>
                    </div>
                `;
            }
        }
    </script>
</body>
